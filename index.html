<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Tycoon</title>
</head>
<body>
    <h1>Welcome to Milk Tycoon!</h1>
    <div id="shop">
        <h2>Shop</h2>
        <p>Milk per click: <span id="milkPerClick">1</span></p>
        <p>Milk per second: <span id="milkPerSecond">0</span></p>
        <button onclick="buyUpgrade()">Buy Upgrade</button>
    </div>
    <audio id="kittenSound" src="kitten.mp3" preload="auto"></audio>
    <script>
        function buyUpgrade() {
            // Logic for buying upgrades
            alert('Upgrade purchased!');
            document.getElementById('kittenSound').play(); // Play sound on upgrade
        }
    </script>
</body>
</html>
