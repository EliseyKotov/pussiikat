<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>
    <script>
        let milk = 0;
        let passiveIncome = 0;
        let multipliers = 1;
        let boosters = [
            { name: 'Passive Income Booster', cost: 1000, income: 5 },
        ];

        function collectMilk() {
            milk += multipliers;
            updateDisplay();
        }

        function buyBooster(index) {
            if (milk >= boosters[index].cost) {
                milk -= boosters[index].cost;
                passiveIncome += boosters[index].income;
                updateDisplay();
            }
        }

        function updateDisplay() {
            document.getElementById('milkAmount').innerText = `Milk: ${milk}`;
            document.getElementById('passiveIncome').innerText = `Passive Income: ${passiveIncome}`;
        }

        function playAudio() {
            const audio = new Audio('audio.mp3');
            audio.play().catch(e => console.error(e));
        }

        function randomMilkMultiplier() {
            if (Math.random() < 0.1) { // 10% chance
                const bonus = Math.floor(Math.random() * 10) + 2; // 2 to 10x multiplier
                setTimeout(() => { multipliers *= bonus; }, 10000);
            }
        }

        setInterval(() => {
            collectMilk();
            randomMilkMultiplier();
        }, 1000);

        setInterval(() => {
            alert('Falling Star Challenge! Collect for bonuses!');
            // Implement challenge logic here
        }, 1800000); // every 30 minutes

    </script>
</head>
<body>
    <h1>Clicker Game</h1>
    <button onclick="collectMilk()">Collect Milk</button>
    <div id="milkAmount">Milk: 0</div>
    <div id="passiveIncome">Passive Income: 0</div>
    <h2>Boosters</h2>
    <ul>
        <li>
            Passive Income Booster: +5 per second (Cost: 1000 milk)
            <button onclick="buyBooster(0)">Buy</button>
        </li>
    </ul>
    <audio id="backgroundAudio" loop>
        <source src="audio.mp3" type="audio/mpeg">
        <source src="audio.ogg" type="audio/ogg">
        Your browser does not support the audio tag.
    </audio>
</body>
</html>
