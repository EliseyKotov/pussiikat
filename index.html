<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Tycoon 🐱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-radius: 30px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 10px;
        }

        .stat {
            flex: 1;
            background: rgba(100, 200, 255, 0.1);
            padding: 15px 12px;
            border-radius: 15px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            transition: all 0.3s;
        }

        .stat:hover {
            background: rgba(100, 200, 255, 0.15);
            border-color: rgba(100, 200, 255, 0.5);
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }

        .milk-value { color: #38bdf8; }
        .tap-value { color: #fbbf24; }
        .passive-value { color: #34d399; }

        .cat {
            width: 200px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            filter: drop-shadow(0 0 20px rgba(100, 200, 255, 0.3));
            margin: 30px 0;
            user-select: none;
        }

        .cat:active {
            transform: scale(0.9);
        }

        .cat:hover {
            filter: drop-shadow(0 0 35px rgba(100, 200, 255, 0.7));
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            padding: 14px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            border: none;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .section {
            display: none;
            margin-top: 20px;
            max-height: 350px;
            overflow-y: auto;
            padding: 5px;
        }

        .section.active {
            display: block;
        }

        .section::-webkit-scrollbar {
            width: 6px;
        }

        .section::-webkit-scrollbar-track {
            background: rgba(100, 200, 255, 0.1);
            border-radius: 10px;
        }

        .section::-webkit-scrollbar-thumb {
            background: rgba(100, 200, 255, 0.4);
            border-radius: 10px;
        }

        .item {
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.1) 0%, rgba(56, 189, 248, 0.05) 100%);
            padding: 16px;
            margin: 10px 0;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(100, 200, 255, 0.2);
        }

        .item:hover {
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.2) 0%, rgba(56, 189, 248, 0.1) 100%);
            border-color: rgba(100, 200, 255, 0.5);
            transform: translateX(5px);
        }

        .item-info {
            text-align: left;
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .item-desc {
            font-size: 12px;
            opacity: 0.7;
        }

        .item-cost {
            background: rgba(56, 189, 248, 0.3);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            margin-left: 10px;
        }

        .item-cost.affordable {
            background: rgba(52, 211, 153, 0.4);
            color: #34d399;
        }

        .item-cost.expensive {
            background: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        .float-text {
            position: fixed;
            font-weight: bold;
            font-size: 28px;
            pointer-events: none;
            animation: floatUp 1.5s forwards;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            z-index: 1000;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.3);
            }
        }

        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 16px 24px;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(100, 200, 255, 0.3);
            font-weight: 600;
            font-size: 14px;
            z-index: 999;
        }

        .notification.show {
            opacity: 1;
        }

        .notification.error {
            border-color: rgba(239, 68, 68, 0.5);
            background: rgba(31, 41, 55, 0.95);
        }

        .notification.success {
            border-color: rgba(52, 211, 153, 0.5);
            background: rgba(15, 23, 42, 0.95);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top">
            <div class="stat">
                <div class="stat-label">🥛 Молоко</div>
                <div class="stat-value milk-value" id="milkDisplay">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">⚡ За клик</div>
                <div class="stat-value tap-value" id="tapDisplay">1</div>
            </div>
            <div class="stat">
                <div class="stat-label">🔄 В сек</div>
                <div class="stat-value passive-value" id="passiveDisplay">0</div>
            </div>
        </div>

        <img src="cat.png" id="catImage" class="cat" alt="Click the cat!">

        <div class="button-group">
            <button class="btn" onclick="toggleSection('shop')">🛒 Магазин</button>
            <button class="btn" onclick="toggleSection('skins')">🎭 Скины</button>
        </div>

        <div id="shop" class="section">
            <div class="item" onclick="buyUpgrade('tap')">
                <div class="item-info">
                    <div class="item-name">⬆️ Мощный клик</div>
                    <div class="item-desc">+1 молоко за клик</div>
                </div>
                <div class="item-cost" id="tapCostDisplay">10</div>
            </div>
            <div class="item" onclick="buyUpgrade('auto')">
                <div class="item-info">
                    <div class="item-name">🤖 Автоматизация</div>
                    <div class="item-desc">+1 молоко в сек</div>
                </div>
                <div class="item-cost" id="autoCostDisplay">50</div>
            </div>
            <div class="item" onclick="buyUpgrade('factory')">
                <div class="item-info">
                    <div class="item-name">🏭 Фабрика молока</div>
                    <div class="item-desc">+5 молока в сек</div>
                </div>
                <div class="item-cost" id="factoryCostDisplay">200</div>
            </div>
        </div>

        <div id="skins" class="section">
            <div class="item" onclick="buySkin('default')">
                <div class="item-info">
                    <div class="item-name">🐱 Обычный кот</div>
                    <div class="item-desc">Стандартный питомец</div>
                </div>
                <div class="item-cost">БЕСПЛАТНО</div>
            </div>
            <div class="item" onclick="buySkin('gold')">
                <div class="item-info">
                    <div class="item-name">✨ Золотой кот</div>
                    <div class="item-desc">Блестящий помощник</div>
                </div>
                <div class="item-cost">1000</div>
            </div>
            <div class="item" onclick="buySkin('devil')">
                <div class="item-info">
                    <div class="item-name">😈 Дьявольский кот</div>
                    <div class="item-desc">Опасный питомец</div>
                </div>
                <div class="item-cost">5000</div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>
    <audio id="clickSound" src="kitten.mp3" preload="auto"></audio>

    <script>
        let gameState = {
            milk: 0,
            perTap: 1,
            passive: 0,
            purchases: { tap: 0, auto: 0, factory: 0 },
            skin: 'default'
        };

        const upgrades = {
            tap: { baseCost: 10, increase: 1.15 },
            auto: { baseCost: 50, increase: 1.15 },
            factory: { baseCost: 200, increase: 1.15 }
        };

        const milkDisplay = document.getElementById('milkDisplay');
        const tapDisplay = document.getElementById('tapDisplay');
        const passiveDisplay = document.getElementById('passiveDisplay');
        const catImage = document.getElementById('catImage');
        const notification = document.getElementById('notification');
        const clickSound = document.getElementById('clickSound');

        function loadGame() {
            const saved = localStorage.getItem('milkTycoonState');
            if (saved) gameState = JSON.parse(saved);
            updateUI();
        }

        function saveGame() {
            localStorage.setItem('milkTycoonState', JSON.stringify(gameState));
        }

        function updateUI() {
            milkDisplay.textContent = formatNumber(gameState.milk);
            tapDisplay.textContent = gameState.perTap;
            passiveDisplay.textContent = gameState.passive;
            updateCostDisplays();
        }

        function formatNumber(n) {
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return n.toString();
        }

        function getCurrentCost(upgradeType) {
            const upgrade = upgrades[upgradeType];
            const count = gameState.purchases[upgradeType];
            return Math.ceil(upgrade.baseCost * Math.pow(upgrade.increase, count));
        }

        function updateCostDisplays() {
            ['tap', 'auto', 'factory'].forEach(type => {
                const cost = getCurrentCost(type);
                const element = document.getElementById(type + 'CostDisplay');
                element.textContent = formatNumber(cost);
                
                if (gameState.milk >= cost) {
                    element.classList.add('affordable');
                    element.classList.remove('expensive');
                } else {
                    element.classList.add('expensive');
                    element.classList.remove('affordable');
                }
            });
        }

        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            const otherSection = sectionId === 'shop' ? 'skins' : 'shop';
            section.classList.toggle('active');
            document.getElementById(otherSection).classList.remove('active');
        }

        catImage.addEventListener('click', function(e) {
            gameState.milk += gameState.perTap;
            clickSound.currentTime = 0;
            clickSound.play().catch(() => {});
            
            catImage.style.transform = 'scale(0.95)';
            setTimeout(() => { catImage.style.transform = ''; }, 100);
            
            createFloatText('+' + gameState.perTap, e.clientX, e.clientY);
            updateUI();
            saveGame();
        });

        function buyUpgrade(upgradeType) {
            const cost = getCurrentCost(upgradeType);
            if (gameState.milk < cost) {
                showNotification('Недостаточно молока! ❌', 'error');
                return;
            }
            
            gameState.milk -= cost;
            gameState.purchases[upgradeType]++;
            
            if (upgradeType === 'tap') {
                gameState.perTap++;
                showNotification('Клик усилен! ⚡', 'success');
            } else if (upgradeType === 'auto') {
                gameState.passive++;
                showNotification('Автоматизация активирована! 🤖', 'success');
            } else {
                gameState.passive += 5;
                showNotification('Фабрика запущена! 🏭', 'success');
            }
            
            updateUI();
            saveGame();
        }

        function buySkin(skinType) {
            const costs = { default: 0, gold: 1000, devil: 5000 };
            const cost = costs[skinType];
            
            if (gameState.milk < cost) {
                showNotification('Недостаточно молока! ❌', 'error');
                return;
            }
            
            gameState.milk -= cost;
            gameState.skin = skinType;
            showNotification('Получен новый скин! ✨', 'success');
            updateUI();
            saveGame();
        }

        function showNotification(message, type = '') {
            notification.textContent = message;
            notification.className = 'notification show ' + type;
            setTimeout(() => notification.classList.remove('show'), 2000);
        }

        function createFloatText(text, x, y) {
            const floatEl = document.createElement('div');
            floatEl.className = 'float-text';
            floatEl.textContent = text;
            floatEl.style.left = x + 'px';
            floatEl.style.top = y + 'px';
            floatEl.style.color = '#38bdf8';
            document.body.appendChild(floatEl);
            setTimeout(() => floatEl.remove(), 1500);
        }

        setInterval(() => {
            if (gameState.passive > 0) {
                gameState.milk += gameState.passive;
                updateUI();
                saveGame();
            }
        }, 1000);

        loadGame();
    </script>
</body>
</html>
