<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🐱 Кот Против Мышей 🐭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a3e, #0f0f1e);
            color: #fff;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        html, body {
            touch-action: manipulation;
        }

        #gameContainer {
            width: 100%;
            height: 100vh;
            position: relative;
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a3e 0%, #0f0f1e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 500;
        }

        .menu-hidden {
            display: none !important;
        }

        .menu-title {
            font-size: 3.5em;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 0 0 30px #FF6B9D, 0 0 60px #FFD700;
            margin-bottom: 40px;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-width: 300px;
        }

        .menu-btn {
            background: linear-gradient(135deg, #87CEEB, #B0E0E6);
            color: #000;
            border: 3px solid #4A90E2;
            padding: 18px 40px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .menu-btn:active {
            transform: scale(0.95);
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .menu-stats {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 30px;
            border-radius: 12px;
            border: 2px solid #FFD700;
            text-align: center;
            font-size: 14px;
        }

        .menu-stat-row {
            margin: 8px 0;
            color: #FFD700;
        }

        .menu-stat-value {
            color: #00FF00;
            font-weight: bold;
            font-size: 16px;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            z-index: 501;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(10, 10, 30, 0.98), rgba(30, 10, 50, 0.98));
            border: 3px solid #FFD700;
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }

        .modal-title {
            font-size: 2em;
            font-weight: bold;
            color: #FFD700;
            margin-bottom: 20px;
            border-bottom: 2px solid #FFD700;
            padding-bottom: 15px;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #FF6B9D;
            color: white;
            border: 2px solid #FF0000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .close-modal-btn:active {
            transform: scale(0.9);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(0,255,255,0.05));
            border: 2px solid #00FFFF;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            color: #00FFFF;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stat-value {
            color: #FFD700;
            font-size: 2em;
            font-weight: bold;
        }

        .achievements-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .achievement-item {
            background: linear-gradient(135deg, rgba(255,107,157,0.1), rgba(255,107,157,0.05));
            border: 2px solid #FF6B9D;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            opacity: 0.5;
        }

        .achievement-item.unlocked {
            opacity: 1;
            border-color: #00FF00;
            background: linear-gradient(135deg, rgba(0,255,0,0.1), rgba(0,255,0,0.05));
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .achievement-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .achievement-name {
            color: #FFD700;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .achievement-desc {
            color: #AAA;
            font-size: 10px;
            line-height: 1.3;
        }

        .quest-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .quest-item {
            background: linear-gradient(135deg, rgba(255,0,255,0.1), rgba(255,0,255,0.05));
            border: 2px solid #FF00FF;
            padding: 15px;
            border-radius: 10px;
        }

        .quest-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .quest-name {
            color: #FF00FF;
            font-weight: bold;
            font-size: 14px;
        }

        .quest-reward {
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid #00FF00;
            color: #00FF00;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .quest-desc {
            color: #AAA;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .quest-progress {
            width: 100%;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #FF00FF;
        }

        .quest-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #FF00FF, #FF6B9D);
            width: 0%;
            transition: width 0.3s;
        }

        .quest-status {
            color: #FFD700;
            font-size: 11px;
            margin-top: 8px;
            text-align: right;
        }

        .game-area {
            width: 100%;
            height: 100%;
            display: none;
        }

        .game-area.active {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- ГЛАВНОЕ МЕН�� -->
        <div class="main-menu" id="mainMenu">
            <div class="menu-title">🐱 КОТ vs МЫШИ 🐭</div>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="startGame()">▶️ НАЧАТЬ ИГРУ</button>
                <button class="menu-btn" onclick="showStatsModal()">📊 СТАТИСТИКА</button>
                <button class="menu-btn" onclick="showAchievementsModal()">🏆 ДОСТИЖЕНИЯ</button>
                <button class="menu-btn" onclick="showQuestsModal()">📝 КВЕСТЫ</button>
            </div>
            <div class="menu-stats">
                <div class="menu-stat-row">Макс волна: <span class="menu-stat-value" id="menuMaxWave">1</span></div>
                <div class="menu-stat-row">Всего молока: <span class="menu-stat-value" id="menuTotalMilk">0</span></div>
                <div class="menu-stat-row">Достижений: <span class="menu-stat-value" id="menuAchievements">0/10</span></div>
                <div class="menu-stat-row">Квестов: <span class="menu-stat-value" id="menuQuests">0/4</span></div>
            </div>
        </div>

        <!-- СТАТИСТИКА МОДАЛЬ -->
        <div class="modal" id="statsModal">
            <div class="modal-content">
                <div class="modal-title">📊 СТАТИСТИКА</div>
                <button class="close-modal-btn" onclick="closeModal('statsModal')">✕</button>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">МАКС ВОЛНА</div>
                        <div class="stat-value" id="statMaxWave">1</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">ВСЕГО МОЛОКА</div>
                        <div class="stat-value" id="statTotalMilk">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">ВСЕГО ВРАГОВ</div>
                        <div class="stat-value" id="statTotalKills">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">МАКС КОМБО</div>
                        <div class="stat-value" id="statMaxCombo">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ДОСТИЖЕНИЯ МОДАЛЬ -->
        <div class="modal" id="achievementsModal">
            <div class="modal-content">
                <div class="modal-title">🏆 ДОСТИЖЕНИЯ</div>
                <button class="close-modal-btn" onclick="closeModal('achievementsModal')">✕</button>
                <div class="achievements-list" id="achievementsList"></div>
            </div>
        </div>

        <!-- КВЕСТЫ МОДАЛЬ -->
        <div class="modal" id="questsModal">
            <div class="modal-content">
                <div class="modal-title">📝 НЕДЕЛЬНЫЕ КВЕСТЫ</div>
                <button class="close-modal-btn" onclick="closeModal('questsModal')">✕</button>
                <div class="quest-list" id="questsList"></div>
            </div>
        </div>

        <!-- ИГРОВАЯ ОБЛАСТЬ -->
        <div class="game-area" id="gameArea">
            <canvas id="gameCanvas"></canvas>
        </div>
    </div>

    <script>
        'use strict';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const STORAGE_KEY = 'catVsMiceGameData';

        function loadGameData() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : null;
        }

        function saveGameData() {
            const data = {
                upgrades: gameState.upgrades,
                activeSkin: gameState.activeSkin,
                ownedSkins: gameState.ownedSkins,
                totalScore: gameState.totalScore,
                maxWave: gameState.maxWave,
                achievements: Array.from(gameState.achievements),
                completedQuests: gameState.completedQuests,
                totalKills: gameState.totalKills
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        const WEEKLY_QUESTS = [
            { id: 'butcher', name: '🥩 Мясник', desc: 'Убить 100 врагов', type: 'totalKills', goal: 100, reward: 200, rewardSkin: 'king', current: 0 },
            { id: 'hunter', name: '🎯 Охотник', desc: 'Пройти волну за ≤20 сек', type: 'waveSpeed', goal: 20, reward: 150, current: 0 },
            { id: 'rich', name: '💰 Богач', desc: 'Заработать 1000 молока за волну', type: 'waveMilk', goal: 1000, reward: 200, current: 0 },
            { id: 'fastman', name: '⚡ Комбо-мастер', desc: 'Создать комбо x5', type: 'combo', goal: 5, reward: 100, rewardSkin: 'moon', current: 0 }
        ];

        const SKINS = {
            tabby: { name: 'Табби', emoji: '🐱', bonus: 'Обычный котик', bonusType: 'none', cost: 0, premium: false },
            warrior: { name: 'Боевой', emoji: '😾', bonus: '+25% урона', bonusType: 'damage', value: 1.25, cost: 150, premium: false },
            sniper: { name: 'Снайпер', emoji: '🐯', bonus: '+50% размер', bonusType: 'bulletSize', value: 1.5, cost: 180, premium: false },
            king: { name: '👑 Король', emoji: '👑', bonus: '+40% всё', bonusType: 'all', value: 1.4, cost: 0, premium: true, questReward: true },
            moon: { name: '🌙 Луна', emoji: '🌙', bonus: '+30% скорость', bonusType: 'fireRate', value: 1.3, cost: 0, premium: true, questReward: true },
            star: { name: '⭐ Звезда', emoji: '⭐', bonus: '+50% комбо', bonusType: 'combo', value: 1.5, cost: 0, premium: true, questReward: true }
        };

        const ACHIEVEMENTS = {
            firstBlood: { name: 'Первая кровь', desc: 'Убить 1 врага', icon: '🩸', check: () => gameState.totalKills >= 1 },
            collector: { name: 'Коллекционер', desc: 'Купить все скины', icon: '👑', check: () => gameState.ownedSkins.length === Object.keys(SKINS).length },
            warrior: { name: 'Воин', desc: 'Убить 100 врагов', icon: '⚔️', check: () => gameState.totalKills >= 100 },
            legend: { name: 'Легенда', desc: 'Дойти до волны 20', icon: '⭐', check: () => gameState.maxWave >= 20 },
            comboMaster: { name: 'Мастер комбо', desc: 'Комбо x5', icon: '🔥', check: () => gameState.maxCombo >= 5 },
            speedRunner: { name: 'Спидраннер', desc: 'Пройти волну за 15 сек', icon: '⚡', check: () => false },
            noHit: { name: 'Непобедимый', desc: 'Пройти волну без урона', icon: '🛡️', check: () => false },
            richMan: { name: 'Богач', desc: 'Накопить 10000 молока', icon: '💰', check: () => gameState.totalScore >= 10000 },
            tenWaves: { name: 'Десятиволнец', desc: 'Пройти 10 волн', icon: '🌊', check: () => gameState.maxWave >= 10 },
            premiumSkins: { name: 'Премиум', desc: 'Получить премиум скин', icon: '💎', check: () => gameState.ownedSkins.some(s => SKINS[s]?.premium) }
        };

        const gameState = {
            currentWave: 1,
            score: 0,
            kills: 0,
            milk: 0,
            isGameOver: false,
            isPaused: false,
            totalScore: 0,
            totalKills: 0,
            maxWave: 1,
            maxCombo: 0,
            combo: 0,
            
            upgrades: {
                damage: { level: 1, baseCost: 35 },
                bulletCount: { level: 1, baseCost: 120 },
                bulletSize: { level: 1, baseCost: 40 },
                health: { level: 1, baseCost: 70 }
            },

            activeBoosters: [],
            achievements: new Set(),
            activeSkin: 'tabby',
            ownedSkins: ['tabby'],
            completedQuests: {}
        };

        const savedData = loadGameData();
        if (savedData) {
            gameState.upgrades = savedData.upgrades;
            gameState.activeSkin = savedData.activeSkin;
            gameState.ownedSkins = savedData.ownedSkins;
            gameState.totalScore = savedData.totalScore;
            gameState.maxWave = savedData.maxWave;
            gameState.achievements = new Set(savedData.achievements || []);
            gameState.totalKills = savedData.totalKills || 0;
            gameState.completedQuests = savedData.completedQuests || {};
        }

        function startGame() {
            console.log('startGame called');
            closeAllModals();
            document.getElementById('mainMenu').classList.add('menu-hidden');
            document.getElementById('gameArea').classList.add('active');
            ctx.fillStyle = '#87CEEB';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('🎮 ИГРА В РАЗРАБОТКЕ', canvas.width / 2, canvas.height / 2);
        }

        function showStatsModal() {
            console.log('showStatsModal called');
            document.getElementById('statMaxWave').textContent = gameState.maxWave;
            document.getElementById('statTotalMilk').textContent = gameState.totalScore;
            document.getElementById('statTotalKills').textContent = gameState.totalKills;
            document.getElementById('statMaxCombo').textContent = gameState.maxCombo;
            openModal('statsModal');
        }

        function showAchievementsModal() {
            console.log('showAchievementsModal called');
            const list = document.getElementById('achievementsList');
            list.innerHTML = '';

            let unlockedCount = 0;
            Object.keys(ACHIEVEMENTS).forEach(key => {
                const achievement = ACHIEVEMENTS[key];
                const unlocked = gameState.achievements.has(key);
                if (unlocked) unlockedCount++;

                const div = document.createElement('div');
                div.className = 'achievement-item' + (unlocked ? ' unlocked' : '');
                div.innerHTML = `
                    <div class="achievement-icon">${achievement.icon}</div>
                    <div class="achievement-name">${achievement.name}</div>
                    <div class="achievement-desc">${achievement.desc}</div>
                `;
                list.appendChild(div);
            });

            document.getElementById('menuAchievements').textContent = `${unlockedCount}/10`;
            openModal('achievementsModal');
        }

        function showQuestsModal() {
            console.log('showQuestsModal called');
            const list = document.getElementById('questsList');
            list.innerHTML = '';

            let completedCount = 0;
            WEEKLY_QUESTS.forEach(quest => {
                const completed = gameState.completedQuests[quest.id];
                if (completed) completedCount++;

                const div = document.createElement('div');
                div.className = 'quest-item';
                const progress = Math.min(100, (quest.current / quest.goal) * 100);
                
                div.innerHTML = `
                    <div class="quest-header">
                        <span class="quest-name">${quest.name}</span>
                        <span class="quest-reward">${completed ? '✓' : quest.reward + ' 🥛'}</span>
                    </div>
                    <div class="quest-desc">${quest.desc}</div>
                    <div class="quest-progress">
                        <div class="quest-progress-bar" style="width: ${progress}%"></div>
                    </div>
                    <div class="quest-status">${quest.current}/${quest.goal}</div>
                `;
                list.appendChild(div);
            });

            document.getElementById('menuQuests').textContent = `${completedCount}/4`;
            openModal('questsModal');
        }

        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        }

        function updateMenuStats() {
            document.getElementById('menuMaxWave').textContent = gameState.maxWave;
            document.getElementById('menuTotalMilk').textContent = gameState.totalScore;
            
            let achievements = gameState.achievements.size;
            document.getElementById('menuAchievements').textContent = `${achievements}/10`;
            
            let completed = Object.values(gameState.completedQuests).filter(x => x).length;
            document.getElementById('menuQuests').textContent = `${completed}/4`;
        }

        // ИНИЦИАЛИЗАЦИЯ
        updateMenuStats();
    </script>
</body>
</html>
