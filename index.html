<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pussiikat</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Pussiikat</h1>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#shop">Shop</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="home">
            <h2>Home</h2>
            <p>Discover our new features!</p>
        </section>
        <section id="shop">
            <h2>Shop</h2>
            <p>Check out our products.</p>
            <div class="product">
                <h3>Product Name</h3>
                <p>Description</p>
                <p>Price: $10.99</p>
                <button>Add to Cart</button>
            </div>
        </section>
        <section id="about">
            <h2>About</h2>
            <p>Learn more about us.</p>
        </section>
    </main>
    <audio controls>
        <source src="kitten.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>
    <footer>
        <p>&copy; 2026 Pussiikat</p>
    </footer>
</body>
</html>
