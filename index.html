<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milk Tycoon 🐱</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
  min-height: 100vh;
}

.container {
  width: 380px;
  background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
  border-radius: 30px;
  padding: 25px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  text-align: center;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.top {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  gap: 10px;
}

.stat {
  flex: 1;
  background: rgba(100, 200, 255, 0.1);
  padding: 12px;
  border-radius: 15px;
  border: 1px solid rgba(100, 200, 255, 0.3);
}

.milk {
  font-size: 28px;
  font-weight: bold;
  color: #38bdf8;
}

.cat {
  width: 220px;
  cursor: pointer;
  transition: transform 0.1s, filter 0.2s;
  filter: drop-shadow(0 0 20px rgba(100, 200, 255, 0.3));
  margin: 20px 0;
}

.cat:active {
  transform: scale(0.85);
}

.cat:hover {
  filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.6));
}

.btn {
  background: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
  padding: 12px 20px;
  border-radius: 15px;
  margin-top: 10px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  border: none;
  color: white;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
}

.btn:active {
  transform: translateY(0);
}

.shop, .skins {
  display: none;
  margin-top: 15px;
  max-height: 300px;
  overflow-y: auto;
  padding: 5px;
}

.shop::-webkit-scrollbar, .skins::-webkit-scrollbar {
  width: 6px;
}

.shop::-webkit-scrollbar-track, .skins::-webkit-scrollbar-track {
  background: rgba(100, 200, 255, 0.1);
  border-radius: 10px;
}

.shop::-webkit-scrollbar-thumb, .skins::-webkit-scrollbar-thumb {
  background: rgba(100, 200, 255, 0.4);
  border-radius: 10px;
}

.item {
  background: linear-gradient(135deg, rgba(100, 200, 255, 0.1) 0%, rgba(56, 189, 248, 0.05) 100%);
  padding: 14px;
  margin: 8px 0;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s;
  border: 1px solid rgba(100, 200, 255, 0.2);
}

.item:hover {
  background: linear-gradient(135deg, rgba(100, 200, 255, 0.2) 0%, rgba(56, 189, 248, 0.1) 100%);
  border-color: rgba(100, 200, 255, 0.5);
  transform: translateX(5px);
}

.item-name {
  text-align: left;
  font-weight: 600;
}

.item-cost {
  background: rgba(56, 189, 248, 0.3);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
}

.float {
  position: fixed;
  font-weight: bold;
  font-size: 24px;
  pointer-events: none;
  animation: float 1.5s forwards;
  text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
}

@keyframes float {
  0% {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateY(-80px) scale(1.2);
  }
}

.note {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.9);
  padding: 14px 20px;
  border-radius: 12px;
  opacity: 0;
  transition: opacity 0.3s;
  border: 1px solid rgba(100, 200, 255, 0.3);
  font-weight: 600;
}

.note.show {
  opacity: 1;
}

.critical {
  color: #fbbf24;
  font-weight: bold;
}
</style>
</head>

<body>

</div>

<div id="note" class="note"></div>
