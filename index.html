<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Arc Raider">
    <title>Arc Raider - Battle Drones</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-arc: #00D9FF;
            --secondary-arc: #FF006E;
            --accent-token: #FFB703;
            --dark-bg: #0A0E27;
            --success-color: #06FFA5;
            --critical-color: #FB5607;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
                color: #fff;
            }
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
            color: #fff;
            overflow: hidden;
            width: 100%;
            height: 100vh;
            overscroll-behavior: none;
            touch-action: none;
        }

        html, body {
            touch-action: manipulation;
        }

        #gameContainer {
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(135deg, #87CEEB 0%, #E0F6FF 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
            image-rendering: crisp-edges;
        }

        /* ============ PAUSE OVERLAY ============ */
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 102;
            backdrop-filter: blur(5px);
        }

        /* ============ PAUSE BUTTON ============ */
        .pause-btn {
            position: absolute;
            top: max(15px, var(--safe-top));
            left: max(15px, var(--safe-left));
            background: rgba(0, 217, 255, 0.3);
            border: 3px solid var(--primary-arc);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 24px;
            cursor: pointer;
            z-index: 104;
            transition: all 0.2s;
            touch-action: manipulation;
            min-width: 48px;
            min-height: 48px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        .pause-btn:active {
            background: rgba(0, 217, 255, 0.7);
            transform: scale(0.95);
        }

        /* ============ PAUSE MENU ============ */
        .pause-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98), rgba(30, 20, 60, 0.98));
            backdrop-filter: blur(10px);
            border: 4px solid var(--accent-token);
            border-radius: 15px;
            z-index: 151;
            display: none;
            max-width: 90vw;
            max-height: 90vh;
            box-shadow: 0 0 40px rgba(255, 183, 3, 0.4);
            animation: slideIn 0.3s ease-out;
            overflow: hidden;
            flex-direction: column;
        }

        .pause-menu.active {
            display: flex;
        }

        .pause-menu-header {
            background: rgba(255, 183, 3, 0.1);
            border-bottom: 2px solid var(--accent-token);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 50px;
        }

        .pause-menu-title {
            color: var(--accent-token);
            font-size: 1.5em;
            font-weight: bold;
            text-shadow: 0 0 10px var(--accent-token);
        }

        .pause-close-btn {
            background: var(--secondary-arc);
            color: white;
            border: 2px solid #ff0000;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            transition: all 0.2s;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            min-width: 44px;
        }

        .pause-close-btn:active {
            transform: scale(0.9);
        }

        .pause-menu-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--primary-arc);
            overflow-x: auto;
        }

        .pause-menu-tab {
            flex: 1;
            min-width: 100px;
            padding: 12px 15px;
            cursor: pointer;
            color: var(--primary-arc);
            border-bottom: 3px solid transparent;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .pause-menu-tab:active {
            background: rgba(0, 217, 255, 0.2);
        }

        .pause-menu-tab.active {
            color: var(--accent-token);
            border-bottom-color: var(--accent-token);
            background: rgba(255, 183, 3, 0.1);
        }

        .pause-menu-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
        }

        .pause-menu-content.active {
            display: block;
        }

        .pause-section {
            margin-bottom: 20px;
        }

        .pause-section-title {
            color: var(--primary-arc);
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 10px;
            border-left: 3px solid var(--primary-arc);
            padding-left: 10px;
        }

        .pause-info-item {
            background: rgba(0, 217, 255, 0.1);
            border-left: 3px solid var(--primary-arc);
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #fff;
        }

        .pause-info-label {
            color: var(--accent-token);
            font-weight: bold;
            display: inline-block;
            min-width: 100px;
        }

        /* ============ STORE IN PAUSE MENU ============ */
        .pause-store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .pause-store-item {
            background: linear-gradient(135deg, rgba(255, 183, 3, 0.15), rgba(255, 183, 3, 0.05));
            border: 2px solid var(--accent-token);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            touch-action: manipulation;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .pause-store-item.booster {
            border-color: var(--secondary-arc);
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.15), rgba(255, 0, 110, 0.05));
        }

        .pause-store-item:active:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 183, 3, 0.4), rgba(255, 183, 3, 0.2));
            transform: scale(0.98);
        }

        .pause-store-item.booster:active:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.4), rgba(255, 0, 110, 0.2));
        }

        .pause-store-item:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pause-store-name {
            color: var(--accent-token);
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .pause-store-item.booster .pause-store-name {
            color: var(--secondary-arc);
        }

        .pause-store-desc {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 6px;
            line-height: 1.2;
            flex-grow: 1;
        }

        .pause-store-cost {
            color: var(--accent-token);
            font-weight: bold;
            font-size: 11px;
            text-align: right;
        }

        /* ============ TOP INFO PANEL ============ */
        .top-info-panel {
            position: absolute;
            top: max(60px, calc(60px + var(--safe-top)));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 8px;
            border: 2px solid var(--primary-arc);
            z-index: 99;
            font-size: 12px;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.2);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .wave-display {
            color: var(--accent-token);
            font-weight: bold;
        }

        .threat-indicator {
            color: var(--critical-color);
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* ============ BOTTOM CONTROLS ============ */
        .bottom-controls {
            position: absolute;
            bottom: max(10px, var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(0, 217, 255, 0.3);
            border: 3px solid var(--primary-arc);
            color: var(--primary-arc);
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            touch-action: manipulation;
            min-width: 50px;
            min-height: 48px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.2);
        }

        .control-btn:active {
            background: rgba(0, 217, 255, 0.7);
            transform: scale(0.95);
        }

        .control-btn.left {
            content: "◀";
        }

        .control-btn.right {
            content: "▶";
        }

        /* ============ FLOATING LABEL ============ */
        .floating-label {
            position: absolute;
            font-size: 2.5em;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 183, 3, 0.8);
            animation: floatAway 2s ease-out forwards;
            z-index: 80;
        }

        @keyframes floatAway {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(1.2);
            }
        }

        /* ============ SHOP TOGGLE (now only for skins) ============ */
        .shop-toggle {
            position: absolute;
            bottom: max(70px, calc(70px + var(--safe-bottom)));
            right: max(15px, var(--safe-right));
            background: rgba(255, 183, 3, 0.3);
            border: 3px solid var(--accent-token);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 28px;
            cursor: pointer;
            z-index: 104;
            transition: all 0.2s;
            touch-action: manipulation;
            min-width: 50px;
            text-align: center;
            animation: pulse 1s infinite;
            min-height: 48px;
            box-shadow: 0 0 15px rgba(255, 183, 3, 0.3);
        }

        .shop-toggle:active {
            background: rgba(255, 183, 3, 0.7);
            transform: scale(0.95);
        }

        /* ============ SKINS PANEL ============ */
        .skins-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98), rgba(30, 20, 60, 0.98));
            backdrop-filter: blur(10px);
            border: 4px solid var(--accent-token);
            padding: 25px;
            border-radius: 15px;
            z-index: 200;
            display: none;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(255, 183, 3, 0.4);
            animation: slideIn 0.3s ease-out;
        }

        .skins-panel.open {
            display: block;
        }

        .skins-panel h1 {
            color: var(--accent-token);
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .skins-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .skin-item {
            background: linear-gradient(135deg, rgba(255, 183, 3, 0.1), rgba(255, 183, 3, 0.05));
            border: 2px solid var(--accent-token);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
            min-height: 44px;
        }

        .skin-item:active {
            transform: scale(0.95);
        }

        .skin-item.owned {
            border-color: var(--success-color);
            background: linear-gradient(135deg, rgba(6, 255, 165, 0.15), rgba(6, 255, 165, 0.05));
        }

        .skin-item.active {
            border-color: var(--secondary-arc);
            background: linear-gradient(135deg, rgba(255, 0, 110, 0.2), rgba(255, 0, 110, 0.1));
            box-shadow: 0 0 15px var(--secondary-arc);
        }

        .skin-emoji {
            font-size: 2.5em;
            margin-bottom: 8px;
        }

        .skin-name {
            color: var(--accent-token);
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .skin-bonus {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .skin-cost {
            color: var(--accent-token);
            font-weight: bold;
            font-size: 11px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--secondary-arc);
            color: white;
            border: 2px solid #ff0000;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            z-index: 201;
            transition: all 0.2s;
            touch-action: manipulation;
            min-height: 44px;
            min-width: 44px;
        }

        .close-btn:active {
            transform: scale(0.9);
        }

        /* ============ GAME OVER ============ */
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid var(--secondary-arc);
            z-index: 200;
            text-align: center;
            display: none;
            min-width: 300px;
            box-shadow: 0 0 30px rgba(255, 0, 110, 0.5);
        }

        .game-over h1 {
            color: var(--secondary-arc);
            font-size: 2.2em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: var(--accent-token);
            font-size: 1.1em;
            margin: 10px 0;
        }

        .game-over-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .game-over-buttons button {
            background: linear-gradient(135deg, var(--accent-token), #FFED4E);
            color: #000;
            border: 2px solid #FF6B00;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
            min-height: 44px;
        }

        .game-over-buttons button:active {
            transform: scale(0.95);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translate(-50%, -60%);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%);
            }
        }

        /* ============ RESPONSIVE ============ */
        @media (max-width: 768px) {
            .skins-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .pause-store-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .top-info-panel {
                font-size: 11px;
                padding: 8px 12px;
                gap: 10px;
            }

            .bottom-controls {
                gap: 8px;
            }

            .control-btn {
                padding: 10px 14px;
                font-size: 12px;
                min-width: 45px;
            }

            .pause-menu {
                max-width: 95vw;
                max-height: 85vh;
            }

            .pause-menu-header {
                padding: 12px;
                min-height: 45px;
            }

            .pause-menu-title {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- Pause Button -->
        <button class="pause-btn" id="pauseBtn">⏸</button>

        <!-- Top Info Panel -->
        <div class="top-info-panel" id="topInfoPanel">
            <span class="wave-display">Wave: <span id="waveDisplay">1</span></span>
            <span class="threat-indicator" id="threatIndicator"></span>
        </div>

        <!-- Bottom Controls -->
        <div class="bottom-controls" id="bottomControls">
            <button class="control-btn left" id="leftBtn">◀</button>
            <button class="control-btn right" id="rightBtn">▶</button>
        </div>

        <!-- Skins Toggle -->
        <button class="shop-toggle" id="skinsToggle">👾</button>

        <!-- Pause Menu -->
        <div class="pause-menu" id="pauseMenu">
            <div class="pause-menu-header">
                <div class="pause-menu-title">PAUSED</div>
                <button class="pause-close-btn" id="pauseCloseBtn">✕</button>
            </div>
            <div class="pause-menu-tabs">
                <div class="pause-menu-tab active" data-tab="stats">📊 Stats</div>
                <div class="pause-menu-tab" data-tab="waves">🌊 Waves</div>
                <div class="pause-menu-tab" data-tab="challenges">⚡ Challenges</div>
                <div class="pause-menu-tab" data-tab="store">🛒 Store</div>
            </div>
            <div class="pause-menu-content active" id="tab-stats">
                <div class="pause-section">
                    <div class="pause-section-title">GAME STATUS</div>
                    <div class="pause-info-item">
                        <span class="pause-info-label">Score:</span>
                        <span id="pauseScore">0</span>
                    </div>
                    <div class="pause-info-item">
                        <span class="pause-info-label">Wave:</span>
                        <span id="pauseWave">1</span>
                    </div>
                    <div class="pause-info-item">
                        <span class="pause-info-label">Health:</span>
                        <span id="pauseHealth">100/100</span>
                    </div>
                    <div class="pause-info-item">
                        <span class="pause-info-label">Tokens:</span>
                        <span id="pauseTokens">0</span>
                    </div>
                </div>

                <div class="pause-section">
                    <div class="pause-section-title">ACHIEVEMENTS</div>
                    <div id="pauseAchievements" style="color: #fff; font-size: 12px;">
                        <em>No achievements yet</em>
                    </div>
                </div>
            </div>

            <div class="pause-menu-content" id="tab-waves">
                <div class="pause-section">
                    <div class="pause-section-title">WAVE INFORMATION</div>
                    <div id="waveInfo" style="color: #fff; font-size: 12px; line-height: 1.6;">
                        <em>Loading wave info...</em>
                    </div>
                </div>
            </div>

            <div class="pause-menu-content" id="tab-challenges">
                <div class="pause-section">
                    <div class="pause-section-title">ACTIVE CHALLENGES</div>
                    <div id="challengeInfo" style="color: #fff; font-size: 12px; line-height: 1.6;">
                        <em>No active challenges</em>
                    </div>
                </div>
            </div>

            <div class="pause-menu-content" id="tab-store">
                <div class="pause-section">
                    <div class="pause-section-title">UPGRADES</div>
                    <div class="pause-store-grid" id="pauseStoreUpgrades"></div>
                </div>
                <div class="pause-section">
                    <div class="pause-section-title">BOOSTERS</div>
                    <div class="pause-store-grid" id="pauseStoreBoosters"></div>
                </div>
            </div>
        </div>

        <!-- Pause Overlay -->
        <div class="pause-overlay" id="pauseOverlay"></div>

        <!-- Skins Panel -->
        <div class="skins-panel" id="skinsPanel">
            <button class="close-btn" id="skinsCloseBtn">✕</button>
            <h1>SELECT YOUR DRONE</h1>
            <div class="skins-grid" id="skinsGrid"></div>
        </div>

        <!-- Game Over Screen -->
        <div class="game-over" id="gameOverScreen">
            <h1>GAME OVER</h1>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Waves Survived: <span id="wavesReached">1</span></p>
            <div class="game-over-buttons">
                <button onclick="location.reload()">RESTART</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        const game = {
            isRunning: true,
            isPaused: false,
            canvas: null,
            ctx: null,
            width: 0,
            height: 0,
            score: 0,
            wave: 1,
            totalEnemiesInWave: 0,
            enemiesDefeated: 0,
            maxHealth: 100,
            health: 100,
            tokens: 0,
            combo: 0,
            comboTimer: 0,
            comboTimeout: 3000,
            playerX: 0,
            playerY: 0,
            playerRadius: 15,
            playerSpeed: 5,
            playerHealth: 100,
            playerMaxHealth: 100,
            projectileSpeed: 7,
            fireRate: 10,
            fireCounter: 0,
            activeBoosters: {},
            achievements: [],
            currentSkin: 'default',
            skinEmojis: {
                default: '⭐',
                fire: '🔥',
                ice: '❄️',
                electric: '⚡',
                diamond: '💎',
                gold: '👑'
            },
            skinStats: {
                default: { damage: 1, health: 100, name: 'Classic' },
                fire: { damage: 1.3, health: 85, name: 'Inferno' },
                ice: { damage: 0.9, health: 120, name: 'Frostbite' },
                electric: { damage: 1.2, health: 90, name: 'Spark' },
                diamond: { damage: 1.1, health: 110, name: 'Diamond' },
                gold: { damage: 1.15, health: 105, name: 'Sovereign' }
            },
            skinCosts: {
                default: 0,
                fire: 500,
                ice: 500,
                electric: 750,
                diamond: 1000,
                gold: 1500
            },
            ownedSkins: ['default'],
            shielded: false,
            shieldHealth: 0,
            shieldMaxHealth: 50,
            enemies: [],
            projectiles: [],
            particles: [],
            shelters: []
        };

        const upgrades = [
            { id: 'health', name: '❤️ Health Pack', desc: 'Restore 50 HP', cost: 100, fn: () => {
                game.health = Math.min(game.health + 50, game.maxHealth);
                addFloatingLabel('+50 HP', game.width / 2, game.height / 2, '#06FFA5');
            }},
            { id: 'damage', name: '💥 Damage Boost', desc: 'Increase damage by 20%', cost: 200, fn: () => {
                game.projectileSpeed *= 1.2;
                addFloatingLabel('+20% Speed', game.width / 2, game.height / 2, '#FFB703');
            }},
            { id: 'shield', name: '🛡️ Shield', desc: 'Gain 50 shield HP', cost: 150, fn: () => {
                game.shielded = true;
                game.shieldHealth = game.shieldMaxHealth;
                addFloatingLabel('+Shield', game.width / 2, game.height / 2, '#00D9FF');
            }},
            { id: 'firerate', name: '⚡ Fire Rate', desc: 'Increase projectile speed', cost: 250, fn: () => {
                game.fireRate += 3;
                addFloatingLabel('+Fire Rate', game.width / 2, game.height / 2, '#FFB703');
            }}
        ];

        const boosters = [
            { id: 'rapid', name: '🚀 Rapid Fire', desc: 'Triple fire rate for 10s', duration: 10000, fn: () => {
                game.fireRate *= 3;
            }, fnEnd: () => {
                game.fireRate /= 3;
            }},
            { id: 'slow', name: '❄️ Time Slow', desc: 'Slow enemies for 8s', duration: 8000, fn: () => {
                // Enemies slow multiplier handled in update
            }, fnEnd: () => {
                // Reset
            }},
            { id: 'dmg', name: '💣 Damage +', desc: 'Double projectile damage for 12s', duration: 12000, fn: () => {
                // Damage multiplier applied on hit
            }, fnEnd: () => {
                // Reset
            }}
        ];

        // ==================== INITIALIZATION ====================
        function init() {
            game.canvas = document.getElementById('gameCanvas');
            game.ctx = game.canvas.getContext('2d');
            resizeCanvas();
            game.playerX = game.width / 2;
            game.playerY = game.height * 0.85;
            game.playerHealth = game.maxHealth;
            initSkins();
            setupEventListeners();
            startWave();
            gameLoop();
        }

        function resizeCanvas() {
            game.width = window.innerWidth;
            game.height = window.innerHeight;
            game.canvas.width = game.width;
            game.canvas.height = game.height;
        }

        function setupEventListeners() {
            window.addEventListener('resize', resizeCanvas);
            document.addEventListener('keydown', handleKeyDown);
            document.addEventListener('keyup', handleKeyUp);

            // Touch/Mouse controls
            document.getElementById('leftBtn').addEventListener('mousedown', () => { game.playerSpeed = -5; });
            document.getElementById('leftBtn').addEventListener('touchstart', (e) => { e.preventDefault(); game.playerSpeed = -5; });
            document.getElementById('leftBtn').addEventListener('mouseup', () => { game.playerSpeed = 0; });
            document.getElementById('leftBtn').addEventListener('touchend', (e) => { e.preventDefault(); game.playerSpeed = 0; });

            document.getElementById('rightBtn').addEventListener('mousedown', () => { game.playerSpeed = 5; });
            document.getElementById('rightBtn').addEventListener('touchstart', (e) => { e.preventDefault(); game.playerSpeed = 5; });
            document.getElementById('rightBtn').addEventListener('mouseup', () => { game.playerSpeed = 0; });
            document.getElementById('rightBtn').addEventListener('touchend', (e) => { e.preventDefault(); game.playerSpeed = 0; });

            // Pause button
            document.getElementById('pauseBtn').addEventListener('click', togglePause);
            document.getElementById('pauseCloseBtn').addEventListener('click', togglePause);

            // Pause menu tabs
            const tabs = document.querySelectorAll('.pause-menu-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.pause-menu-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.pause-menu-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    const tabName = tab.getAttribute('data-tab');
                    document.getElementById(`tab-${tabName}`).classList.add('active');
                });
            });

            // Skins panel
            document.getElementById('skinsToggle').addEventListener('click', () => {
                document.getElementById('skinsPanel').classList.add('open');
            });
            document.getElementById('skinsCloseBtn').addEventListener('click', () => {
                document.getElementById('skinsPanel').classList.remove('open');
            });
        }

        function handleKeyDown(e) {
            if (e.key === 'ArrowLeft' || e.key === 'a') {
                game.playerSpeed = -5;
            } else if (e.key === 'ArrowRight' || e.key === 'd') {
                game.playerSpeed = 5;
            } else if (e.key === ' ') {
                e.preventDefault();
                fireProjectile();
            } else if (e.key === 'Escape') {
                togglePause();
            }
        }

        function handleKeyUp(e) {
            if ((e.key === 'ArrowLeft' || e.key === 'a') && game.playerSpeed === -5) {
                game.playerSpeed = 0;
            } else if ((e.key === 'ArrowRight' || e.key === 'd') && game.playerSpeed === 5) {
                game.playerSpeed = 0;
            }
        }

        function togglePause() {
            game.isPaused = !game.isPaused;
            document.getElementById('pauseMenu').classList.toggle('active');
            document.getElementById('pauseOverlay').style.display = game.isPaused ? 'block' : 'none';
            
            if (game.isPaused) {
                updatePauseMenu();
            }
        }

        function updatePauseMenu() {
            document.getElementById('pauseScore').textContent = game.score;
            document.getElementById('pauseWave').textContent = game.wave;
            document.getElementById('pauseHealth').textContent = `${game.health}/${game.maxHealth}`;
            document.getElementById('pauseTokens').textContent = game.tokens;
            document.getElementById('waveDisplay').textContent = game.wave;

            // Wave info
            let waveInfo = `<strong>Wave ${game.wave}</strong><br>`;
            waveInfo += `Enemies: ${game.totalEnemiesInWave}<br>`;
            waveInfo += `Defeated: ${game.enemiesDefeated}<br>`;
            waveInfo += `Remaining: ${game.enemies.length}<br>`;
            const difficulty = game.wave <= 3 ? 'EASY' : game.wave <= 6 ? 'MEDIUM' : 'HARD';
            waveInfo += `Difficulty: <span style="color: ${game.wave <= 3 ? '#06FFA5' : game.wave <= 6 ? '#FFB703' : '#FB5607'};">${difficulty}</span>`;
            document.getElementById('waveInfo').innerHTML = waveInfo;

            // Achievements
            const achText = game.achievements.length > 0 ? 
                game.achievements.map(a => `✓ ${a}`).join('<br>') : 
                '<em>No achievements yet</em>';
            document.getElementById('pauseAchievements').innerHTML = achText;

            // Store
            updatePauseStore();
        }

        function updatePauseStore() {
            const upgradesContainer = document.getElementById('pauseStoreUpgrades');
            const boostersContainer = document.getElementById('pauseStoreBoosters');
            upgradesContainer.innerHTML = '';
            boostersContainer.innerHTML = '';

            upgrades.forEach(upgrade => {
                const btn = document.createElement('div');
                btn.className = 'pause-store-item';
                btn.innerHTML = `
                    <div class="pause-store-name">${upgrade.name}</div>
                    <div class="pause-store-desc">${upgrade.desc}</div>
                    <div class="pause-store-cost">💰 ${upgrade.cost}</div>
                `;
                btn.disabled = game.tokens < upgrade.cost;
                if (btn.disabled) btn.style.opacity = '0.5';
                btn.onclick = () => buyUpgrade(upgrade);
                upgradesContainer.appendChild(btn);
            });

            boosters.forEach(booster => {
                const btn = document.createElement('div');
                btn.className = 'pause-store-item booster';
                btn.innerHTML = `
                    <div class="pause-store-name">${booster.name}</div>
                    <div class="pause-store-desc">${booster.desc}</div>
                    <div class="pause-store-cost">💰 ${booster.cost || 300}</div>
                `;
                btn.disabled = game.tokens < (booster.cost || 300) || game.activeBoosters[booster.id];
                if (btn.disabled) btn.style.opacity = '0.5';
                btn.onclick = () => buyBooster(booster);
                boostersContainer.appendChild(btn);
            });
        }

        function buyUpgrade(upgrade) {
            if (game.tokens >= upgrade.cost && !game.isPaused) return;
            if (game.tokens >= upgrade.cost) {
                game.tokens -= upgrade.cost;
                upgrade.fn();
            }
        }

        function buyBooster(booster) {
            const cost = booster.cost || 300;
            if (game.tokens >= cost && !game.activeBoosters[booster.id] && !game.isPaused) return;
            if (game.tokens >= cost && !game.activeBoosters[booster.id]) {
                game.tokens -= cost;
                activateBooster(booster);
            }
        }

        function initSkins() {
            const grid = document.getElementById('skinsGrid');
            grid.innerHTML = '';
            
            for (const [skinKey, emoji] of Object.entries(game.skinEmojis)) {
                const skinData = game.skinStats[skinKey];
                const cost = game.skinCosts[skinKey];
                const isOwned = game.ownedSkins.includes(skinKey);
                const isActive = game.currentSkin === skinKey;

                const item = document.createElement('div');
                item.className = 'skin-item';
                if (isOwned) item.classList.add('owned');
                if (isActive) item.classList.add('active');

                item.innerHTML = `
                    <div class="skin-emoji">${emoji}</div>
                    <div class="skin-name">${skinData.name}</div>
                    <div class="skin-bonus">DMG: ${skinData.damage}x | HP: ${skinData.health}</div>
                    <div class="skin-cost">${isOwned ? (isActive ? '✓ ACTIVE' : 'OWNED') : '💰 ' + cost}</div>
                `;

                item.onclick = () => {
                    if (isOwned) {
                        selectSkin(skinKey);
                    } else if (game.tokens >= cost) {
                        game.tokens -= cost;
                        game.ownedSkins.push(skinKey);
                        selectSkin(skinKey);
                        initSkins();
                    }
                };

                grid.appendChild(item);
            }
        }

        function selectSkin(skinKey) {
            game.currentSkin = skinKey;
            const stats = game.skinStats[skinKey];
            game.projectileSpeed = 7 * stats.damage;
            game.maxHealth = stats.health;
            game.playerHealth = stats.health;
            game.health = stats.health;
            initSkins();
            document.getElementById('skinsPanel').classList.remove('open');
        }

        // ==================== GAME LOOP ====================
        function gameLoop() {
            if (!game.isPaused) {
                update();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (!game.isRunning) return;

            // Update player
            game.playerX += game.playerSpeed;
            game.playerX = Math.max(game.playerRadius, Math.min(game.playerX, game.width - game.playerRadius));

            // Update fire counter
            game.fireCounter++;
            if (game.fireCounter >= game.fireRate) {
                fireProjectile();
                game.fireCounter = 0;
            }

            // Update combo
            if (game.comboTimer > 0) {
                game.comboTimer--;
            } else {
                game.combo = 0;
            }

            // Update enemies
            const slowMultiplier = game.activeBoosters['slow'] ? 0.5 : 1;
            for (let i = game.enemies.length - 1; i >= 0; i--) {
                const enemy = game.enemies[i];
                enemy.y += enemy.speed * slowMultiplier;

                // Collect boosters
                if (enemy.boosterType) {
                    const dist = Math.hypot(enemy.x - game.playerX, enemy.y - game.playerY);
                    if (dist < game.playerRadius + 20) {
                        collectBooster(enemy.boosterType);
                        game.enemies.splice(i, 1);
                        continue;
                    }
                }

                if (enemy.y > game.height) {
                    game.health -= 10;
                    game.enemies.splice(i, 1);
                    if (game.health <= 0) gameOver();
                } else if (game.enemies[i]) {
                    // Check collision with shelters
                    if (checkShelterCollision(enemy)) {
                        game.enemies.splice(i, 1);
                    }
                }
            }

            // Update projectiles
            for (let i = game.projectiles.length - 1; i >= 0; i--) {
                const proj = game.projectiles[i];
                proj.y -= proj.speed;

                if (proj.y < 0) {
                    game.projectiles.splice(i, 1);
                    continue;
                }

                // Check shelter collision
                if (checkProjectileShelterCollision(proj)) {
                    game.projectiles.splice(i, 1);
                    continue;
                }

                // Check enemy collision
                for (let j = game.enemies.length - 1; j >= 0; j--) {
                    const enemy = game.enemies[j];
                    const dist = Math.hypot(proj.x - enemy.x, proj.y - enemy.y);
                    const minDist = proj.radius + enemy.radius;

                    if (dist < minDist) {
                        let damage = 10;
                        if (game.activeBoosters['dmg']) damage *= 2;
                        if (game.currentSkin !== 'default') {
                            damage *= game.skinStats[game.currentSkin].damage;
                        }

                        enemy.health -= damage;
                        game.projectiles.splice(i, 1);

                        if (enemy.health <= 0) {
                            game.enemies.splice(j, 1);
                            game.combo++;
                            game.comboTimer = game.comboTimeout;
                            const baseReward = enemy.isStrong ? 50 : 25;
                            const reward = Math.floor(baseReward * (1 + game.combo * 0.1));
                            game.tokens += reward;
                            game.score += reward * 10;
                            game.enemiesDefeated++;

                            // Spawn booster randomly
                            if (Math.random() < 0.2) {
                                const boosterTypes = ['rapid', 'slow', 'dmg'];
                                const randomBooster = boosterTypes[Math.floor(Math.random() * boosterTypes.length)];
                                spawnBoosterDrop(enemy.x, enemy.y, randomBooster);
                            }

                            createParticles(enemy.x, enemy.y, enemy.color);
                            
                            if (game.enemiesDefeated === game.totalEnemiesInWave) {
                                startWave();
                            }
                        } else {
                            createParticles(proj.x, proj.y, '#FFB703');
                        }
                        break;
                    }
                }
            }

            // Update particles
            for (let i = game.particles.length - 1; i >= 0; i--) {
                const p = game.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    game.particles.splice(i, 1);
                }
            }

            // Check player collision with enemies
            for (const enemy of game.enemies) {
                const dist = Math.hypot(game.playerX - enemy.x, game.playerY - enemy.y);
                if (dist < game.playerRadius + enemy.radius) {
                    if (game.shielded) {
                        game.shieldHealth -= 10;
                        if (game.shieldHealth <= 0) {
                            game.shielded = false;
                        }
                    } else {
                        game.health -= 5;
                        if (game.health <= 0) gameOver();
                    }
                }
            }

            // Update boosters
            for (const [boosterId, endTime] of Object.entries(game.activeBoosters)) {
                if (Date.now() > endTime) {
                    const booster = boosters.find(b => b.id === boosterId);
                    if (booster && booster.fnEnd) booster.fnEnd();
                    delete game.activeBoosters[boosterId];
                }
            }
        }

        function checkShelterCollision(enemy) {
            for (const shelter of game.shelters) {
                if (enemy.x > shelter.x && enemy.x < shelter.x + shelter.width &&
                    enemy.y > shelter.y && enemy.y < shelter.y + shelter.height) {
                    return true;
                }
            }
            return false;
        }

        function checkProjectileShelterCollision(proj) {
            for (const shelter of game.shelters) {
                if (proj.x > shelter.x && proj.x < shelter.x + shelter.width &&
                    proj.y > shelter.y && proj.y < shelter.y + shelter.height) {
                    return true;
                }
            }
            return false;
        }

        function spawnBoosterDrop(x, y, type) {
            game.enemies.push({
                x: x,
                y: y,
                speed: 2,
                radius: 10,
                health: 1,
                boosterType: type,
                color: '#FF006E',
                isBoosterDrop: true
            });
        }

        function collectBooster(type) {
            const booster = boosters.find(b => b.id === type);
            if (booster && !game.activeBoosters[type]) {
                activateBooster(booster);
            }
        }

        function activateBooster(booster) {
            if (booster.fn) booster.fn();
            game.activeBoosters[booster.id] = Date.now() + booster.duration;
            addFloatingLabel(`+${booster.name}`, game.width / 2, game.height / 2, '#FF006E');
        }

        function fireProjectile() {
            game.projectiles.push({
                x: game.playerX,
                y: game.playerY - game.playerRadius,
                speed: game.projectileSpeed,
                radius: 5,
                color: '#00D9FF'
            });
        }

        function startWave() {
            game.wave++;
            game.enemiesDefeated = 0;
            game.enemies = [];
            game.shelters = [];

            // Add shelters starting from wave 6
            if (game.wave >= 6) {
                game.shelters.push({
                    x: game.width / 2 - 40,
                    y: game.height / 2 - 30,
                    width: 80,
                    height: 60
                });
                if (game.wave >= 8) {
                    game.shelters.push({
                        x: game.width / 4,
                        y: game.height * 0.6,
                        width: 60,
                        height: 50
                    });
                    game.shelters.push({
                        x: game.width * 0.75,
                        y: game.height * 0.6,
                        width: 60,
                        height: 50
                    });
                }
            }

            const baseEnemies = 3 + game.wave * 2;
            game.totalEnemiesInWave = baseEnemies;

            const colors = ['#FF1493', '#00CED1', '#32CD32', '#FFD700'];

            for (let i = 0; i < baseEnemies; i++) {
                const isStrong = game.wave >= 3 && Math.random() < (0.2 + game.wave * 0.05);
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                game.enemies.push({
                    x: Math.random() * (game.width - 40) + 20,
                    y: -40,
                    speed: 1 + game.wave * 0.2,
                    radius: isStrong ? 12 : 8,
                    health: isStrong ? 30 : 15,
                    maxHealth: isStrong ? 30 : 15,
                    color: color,
                    isStrong: isStrong
                });
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const angle = (Math.PI * 2 * i) / 8;
                const speed = 2 + Math.random();
                game.particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 30,
                    color: color,
                    radius: 3
                });
            }
        }

        function addFloatingLabel(text, x, y, color) {
            const label = document.createElement('div');
            label.className = 'floating-label';
            label.textContent = text;
            label.style.color = color;
            label.style.left = x + 'px';
            label.style.top = y + 'px';
            document.getElementById('gameContainer').appendChild(label);
            setTimeout(() => label.remove(), 2000);
        }

        function gameOver() {
            game.isRunning = false;
            document.getElementById('gameOverScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = game.score;
            document.getElementById('wavesReached').textContent = game.wave;
        }

        // ==================== RENDERING ====================
        function draw() {
            // Clear canvas
            game.ctx.fillStyle = 'rgba(135, 206, 235, 0.1)';
            game.ctx.fillRect(0, 0, game.width, game.height);

            // Draw shelters
            game.ctx.fillStyle = 'rgba(100, 100, 100, 0.5)';
            game.ctx.strokeStyle = '#888888';
            game.ctx.lineWidth = 3;
            for (const shelter of game.shelters) {
                game.ctx.fillRect(shelter.x, shelter.y, shelter.width, shelter.height);
                game.ctx.strokeRect(shelter.x, shelter.y, shelter.width, shelter.height);
            }

            // Draw enemies
            for (const enemy of game.enemies) {
                if (enemy.isBoosterDrop) {
                    // Draw booster drop
                    game.ctx.fillStyle = enemy.color;
                    game.ctx.beginPath();
                    game.ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                    game.ctx.fill();
                    game.ctx.strokeStyle = '#FFFFFF';
                    game.ctx.lineWidth = 2;
                    game.ctx.stroke();
                } else {
                    // Draw enemy
                    game.ctx.fillStyle = enemy.color;
                    game.ctx.beginPath();
                    game.ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                    game.ctx.fill();

                    if (enemy.isStrong) {
                        game.ctx.strokeStyle = '#FFFF00';
                        game.ctx.lineWidth = 3;
                        game.ctx.stroke();
                    }

                    // Health bar
                    const healthPercent = enemy.health / enemy.maxHealth;
                    game.ctx.fillStyle = healthPercent > 0.5 ? '#06FFA5' : '#FB5607';
                    game.ctx.fillRect(enemy.x - 15, enemy.y - 25, 30 * healthPercent, 4);
                    game.ctx.strokeStyle = '#fff';
                    game.ctx.lineWidth = 1;
                    game.ctx.strokeRect(enemy.x - 15, enemy.y - 25, 30, 4);
                }
            }

            // Draw projectiles
            for (const proj of game.projectiles) {
                game.ctx.fillStyle = proj.color;
                game.ctx.beginPath();
                game.ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI * 2);
                game.ctx.fill();
                game.ctx.strokeStyle = '#FFFFFF';
                game.ctx.lineWidth = 1;
                game.ctx.stroke();
            }

            // Draw particles
            for (const p of game.particles) {
                game.ctx.fillStyle = p.color;
                game.ctx.globalAlpha = p.life / 30;
                game.ctx.beginPath();
                game.ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                game.ctx.fill();
                game.ctx.globalAlpha = 1;
            }

            // Draw player
            const skin = game.skinEmojis[game.currentSkin] || '⭐';
            game.ctx.font = '40px Arial';
            game.ctx.textAlign = 'center';
            game.ctx.textBaseline = 'middle';
            game.ctx.fillText(skin, game.playerX, game.playerY);

            // Draw shield
            if (game.shielded) {
                game.ctx.strokeStyle = '#00D9FF';
                game.ctx.lineWidth = 3;
                game.ctx.beginPath();
                game.ctx.arc(game.playerX, game.playerY, game.playerRadius + 10, 0, Math.PI * 2);
                game.ctx.stroke();
            }

            // Update top info panel
            document.getElementById('waveDisplay').textContent = game.wave;
            const threatText = game.enemies.length > 0 ? `THREAT: ${game.enemies.length}` : '';
            document.getElementById('threatIndicator').textContent = threatText;

            if (threatText === '') {
                document.getElementById('threatIndicator').style.display = 'none';
            } else {
                document.getElementById('threatIndicator').style.display = 'inline';
            }
        }

        // Start the game
        window.addEventListener('load', init);
    </script>
</body>
