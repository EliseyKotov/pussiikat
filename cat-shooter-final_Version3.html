<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кот Против Мышей - Игра</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #87ceeb;
            color: #fff;
            overflow: hidden;
            width: 100%;
            height: 100vh;
        }

        #gameContainer {
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
            overflow: hidden;
            touch-action: none;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 18px;
            border-radius: 10px;
            border: 3px solid #ff6b9d;
            z-index: 100;
            font-size: 13px;
            min-width: 200px;
        }

        .hud-item {
            margin: 6px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .hud-label {
            color: #ffd700;
            font-weight: bold;
            min-width: 80px;
        }

        .hud-value {
            color: #fff;
            font-weight: bold;
            font-size: 16px;
        }

        .health-bar {
            width: 140px;
            height: 14px;
            background: #333;
            border: 2px solid #ffd700;
            border-radius: 7px;
            overflow: hidden;
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d, #ffd700);
            transition: width 0.2s;
        }

        .score-board {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 18px;
            border-radius: 10px;
            border: 3px solid #ffd700;
            z-index: 100;
            text-align: right;
            font-size: 13px;
        }

        .score-item {
            margin: 6px 0;
        }

        .score-label {
            color: #ffd700;
            font-weight: bold;
            font-size: 11px;
        }

        .score-value {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }

        .mobile-controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 130px;
            height: 130px;
            background: rgba(0, 0, 0, 0.6);
            border: 3px solid #ffd700;
            border-radius: 12px;
            z-index: 100;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 3px;
            padding: 6px;
        }

        .joystick-btn {
            background: rgba(255, 215, 0, 0.3);
            border: 2px solid #ffd700;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            user-select: none;
            -webkit-user-select: none;
            transition: all 0.1s;
            font-weight: bold;
        }

        .joystick-btn:active {
            background: rgba(255, 215, 0, 0.8);
            transform: scale(0.95);
        }

        .shop-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(10, 10, 30, 0.95);
            padding: 15px;
            border-radius: 12px;
            border: 3px solid #ffd700;
            z-index: 100;
            font-size: 12px;
            max-width: 200px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .shop-title {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 8px;
            font-size: 14px;
        }

        .shop-item {
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
            border: 2px solid #ffd700;
            color: #fff;
            padding: 10px;
            margin: 6px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
        }

        .shop-item:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,215,0,0.15));
            transform: translateX(3px);
        }

        .shop-item:active:not(:disabled) {
            background: linear-gradient(135deg, rgba(255,215,0,0.4), rgba(255,215,0,0.2));
        }

        .shop-item:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .item-name {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .item-desc {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .item-cost {
            color: #ffff00;
            font-weight: bold;
            text-align: right;
        }

        .level-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid #ffd700;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 150;
            display: none;
            animation: popIn 0.5s ease-out;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        .level-info h2 {
            color: #ffd700;
            font-size: 2.2em;
            margin-bottom: 15px;
        }

        .level-info p {
            color: #fff;
            font-size: 1.1em;
            margin: 8px 0;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #ff6b9d;
            z-index: 200;
            text-align: center;
            display: none;
            min-width: 300px;
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.5);
        }

        .game-over h1 {
            color: #ff6b9d;
            font-size: 2.2em;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #ffd700;
            font-size: 1.1em;
            margin: 10px 0;
        }

        .game-over-buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .game-over-buttons button {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            border: 2px solid #ff6b00;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }

        .game-over-buttons button:active {
            transform: scale(0.95);
        }

        .skins-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 30, 0.98);
            border: 4px solid #ffd700;
            padding: 25px;
            border-radius: 15px;
            z-index: 200;
            display: none;
            max-width: 90vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }

        .skins-panel h1 {
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .skins-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .skin-item {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,215,0,0.05));
            border: 2px solid #ffd700;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .skin-item:hover {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.1));
            transform: translateY(-5px);
        }

        .skin-item.owned {
            border-color: #00ff00;
            background: linear-gradient(135deg, rgba(0,255,0,0.15), rgba(0,255,0,0.05));
        }

        .skin-item.active {
            border-color: #ff6b9d;
            background: linear-gradient(135deg, rgba(255,107,157,0.2), rgba(255,107,157,0.1));
            box-shadow: 0 0 15px #ff6b9d;
        }

        .skin-emoji {
            font-size: 2.5em;
            margin-bottom: 8px;
        }

        .skin-name {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .skin-bonus {
            color: #aaa;
            font-size: 10px;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .skin-cost {
            color: #ffff00;
            font-weight: bold;
            font-size: 11px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff6b9d;
            color: white;
            border: 2px solid #ff0000;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            z-index: 201;
            transition: all 0.2s;
        }

        .close-btn:active {
            transform: scale(0.9);
        }

        @media (max-width: 768px) {
            .hud, .score-board, .shop-panel {
                font-size: 11px;
            }
            
            .skins-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .mobile-controls {
                width: 100px;
                height: 100px;
                bottom: 5px;
                left: 5px;
            }

            .shop-panel {
                max-width: 140px;
                font-size: 10px;
                bottom: 5px;
                right: 5px;
            }

            .joystick-btn {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div class="hud-item">
                <span class="hud-label">❤️ HP:</span>
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%;"></div>
                </div>
            </div>
            <div class="hud-item">
                <span class="hud-label">🥛 Молоко:</span>
                <span class="hud-value" id="milk">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">💥 Урон:</span>
                <span class="hud-value" id="damage">10</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">📊 Волна:</span>
                <span class="hud-value" id="level">1</span>
            </div>
        </div>

        <div class="score-board">
            <div class="score-item">
                <span class="score-label">ОЧКИ</span>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-item">
                <span class="score-label">УБИЙСТВ</span>
                <div class="score-value" id="kills">0</div>
            </div>
        </div>

        <div class="mobile-controls">
            <div></div>
            <div class="joystick-btn" id="upBtn">⬆️</div>
            <div></div>
            
            <div class="joystick-btn" id="leftBtn">⬅️</div>
            <div class="joystick-btn" id="centerBtn" style="cursor: default; background: rgba(100,100,100,0.3); border: 2px solid #666;">●</div>
            <div class="joystick-btn" id="rightBtn">➡️</div>
            
            <div></div>
            <div class="joystick-btn" id="downBtn">⬇️</div>
            <div></div>
        </div>

        <div class="shop-panel">
            <div class="shop-title">🛍️ МАГАЗИН</div>
            
            <button class="shop-item" id="damageBtn" onclick="upgradeDamage()">
                <span class="item-name">💥 Урон</span>
                <span class="item-desc">Больше урона по мышам</span>
                <span class="item-cost" id="damageCost">50🥛</span>
            </button>

            <button class="shop-item" id="fireRateBtn" onclick="upgradeFireRate()">
                <span class="item-name">🔥 Скорость</span>
                <span class="item-desc">Быстрее стрелять</span>
                <span class="item-cost" id="fireRateCost">75🥛</span>
            </button>

            <button class="shop-item" id="bulletBtn" onclick="upgradeBulletSize()">
                <span class="item-name">◯ Размер пули</span>
                <span class="item-desc">Большие снаряды</span>
                <span class="item-cost" id="bulletCost">60🥛</span>
            </button>

            <button class="shop-item" id="healthBtn" onclick="upgradeHealth()">
                <span class="item-name">❤️ Здоровье</span>
                <span class="item-desc">Больше HP</span>
                <span class="item-cost" id="healthCost">100🥛</span>
            </button>

            <button class="shop-item" id="skinsBtn" onclick="showSkinsPanel()">
                <span class="item-name">🎨 Скины</span>
                <span class="item-desc">Новые костюмы</span>
            </button>
        </div>

        <div id="levelInfo" class="level-info">
            <h2 id="levelTitle">Волна 1</h2>
            <p id="levelDesc">Обычные мыши</p>
        </div>

        <div id="gameOver" class="game-over">
            <h1>💀 ИГРА ОКОНЧЕНА 💀</h1>
            <p id="gameOverScore">Очки: 0</p>
            <p id="gameOverKills">Убито мышей: 0</p>
            <p id="gameOverLevel">Волн пройдено: 1</p>
            <div class="game-over-buttons">
                <button onclick="location.reload()">🔄 ЗАНОВО</button>
            </div>
        </div>

        <div id="skinsPanel" class="skins-panel">
            <button class="close-btn" onclick="hideSkinsPanel()">✕</button>
            <h1>🎨 СКИНЫ КОТИКА</h1>
            <div class="skins-grid" id="skinsGrid"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // ============ ЗАГРУЗКА ИЗОБРАЖЕНИЙ ============
        const images = {
            cat: new Image(),
            mouse1: new Image(),
            mouse2: new Image(),
            mouse3: new Image(),
            mouse4: new Image(),
            mouse5: new Image()
        };

        images.cat.src = 'cat.png';
        images.mouse1.src = 'mouse1.png';
        images.mouse2.src = 'mouse2.png';
        images.mouse3.src = 'mouse3.png';
        images.mouse4.src = 'mouse4.png';
        images.mouse5.src = 'mouse5.png';

        // ============ ЗВУКИ ============
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'shoot') {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = 600;
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.08);
                    osc.start(audioContext.currentTime);
                    osc.stop(audioContext.currentTime + 0.08);
                } else if (type === 'hit') {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.value = 800;
                    gain.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.15);
                    osc.start(audioContext.currentTime);
                    osc.stop(audioContext.currentTime + 0.15);
                } else if (type === 'enemy-death') {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    osc.frequency.setValueAtTime(600, audioContext.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(200, audioContext.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                    osc.start(audioContext.currentTime);
                    osc.stop(audioContext.currentTime + 0.3);
                }
            } catch (e) {}
        }

        // ============ СОСТОЯНИЕ ИГРЫ ============
        const gameState = {
            currentWave: 1,
            score: 0,
            kills: 0,
            milk: 0,
            isGameOver: false,
            
            upgrades: {
                damage: { level: 1, cost: 50 },
                fireRate: { level: 1, cost: 75 },
                bulletSize: { level: 1, cost: 60 },
                health: { level: 1, cost: 100 }
            },

            activeSkin: 'tabby',
            ownedSkins: ['tabby']
        };

        // ============ СКИНЫ ============
        const SKINS = {
            tabby: { name: 'Табби', emoji: '🐱', bonus: 'Обычный котик', bonusType: 'none', cost: 0 },
            warrior: { name: 'Боевой', emoji: '😾', bonus: '+25% урона по врагам', bonusType: 'damage', value: 1.25, cost: 200 },
            sniper: { name: 'Снайпер', emoji: '🐯', bonus: '+50% размер снарядов', bonusType: 'bulletSize', value: 1.5, cost: 250 },
            doctor: { name: 'Доктор', emoji: '🐱‍⚕️', bonus: '+30% максимум HP', bonusType: 'health', value: 1.3, cost: 300 },
            gunner: { name: 'Пулемётчик', emoji: '🐱‍🐉', bonus: '+50% скорость стрельбы', bonusType: 'fireRate', value: 1.5, cost: 350 },
            ninja: { name: 'Ниндзя', emoji: '🐱‍👓', bonus: '+20% ко всему', bonusType: 'all', value: 1.2, cost: 500 }
        };

        // ============ МОБИЛЬНОЕ УПРАВЛЕНИЕ ============
        const keys = { a: false, d: false, w: false, s: false };

        document.getElementById('upBtn').addEventListener('touchstart', () => { keys.w = true; });
        document.getElementById('upBtn').addEventListener('touchend', () => { keys.w = false; });
        document.getElementById('downBtn').addEventListener('touchstart', () => { keys.s = true; });
        document.getElementById('downBtn').addEventListener('touchend', () => { keys.s = false; });
        document.getElementById('leftBtn').addEventListener('touchstart', () => { keys.a = true; });
        document.getElementById('leftBtn').addEventListener('touchend', () => { keys.a = false; });
        document.getElementById('rightBtn').addEventListener('touchstart', () => { keys.d = true; });
        document.getElementById('rightBtn').addEventListener('touchend', () => { keys.d = false; });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'a') keys.a = true;
            if (key === 'd') keys.d = true;
            if (key === 'w') keys.w = true;
            if (key === 's') keys.s = true;
            if (key === 'arrowleft') keys.a = true;
            if (key === 'arrowright') keys.d = true;
            if (key === 'arrowup') keys.w = true;
            if (key === 'arrowdown') keys.s = true;
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'a') keys.a = false;
            if (key === 'd') keys.d = false;
            if (key === 'w') keys.w = false;
            if (key === 's') keys.s = false;
            if (key === 'arrowleft') keys.a = false;
            if (key === 'arrowright') keys.d = false;
            if (key === 'arrowup') keys.w = false;
            if (key === 'arrowdown') keys.s = false;
        });

        // ============ ИГРОК (КОТИК) ============
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 120,
            width: 80,
            height: 80,
            velocityX: 0,
            velocityY: 0,
            health: 100,
            maxHealth: 100,
            fireRate: 0,
            rotation: 0,
            
            getDamage() {
                let dmg = 10 + (gameState.upgrades.damage.level - 1) * 5;
                const skin = SKINS[gameState.activeSkin];
                if (skin.bonusType === 'damage') dmg *= skin.value;
                if (skin.bonusType === 'all') dmg *= skin.value;
                return dmg;
            },

            getFireRate() {
                let rate = Math.max(3, 10 - (gameState.upgrades.fireRate.level - 1) * 1.5);
                const skin = SKINS[gameState.activeSkin];
                if (skin.bonusType === 'fireRate') rate /= skin.value;
                if (skin.bonusType === 'all') rate /= skin.value;
                return rate;
            },

            getBulletSize() {
                let size = 4 + (gameState.upgrades.bulletSize.level - 1) * 1.5;
                const skin = SKINS[gameState.activeSkin];
                if (skin.bonusType === 'bulletSize') size *= skin.value;
                if (skin.bonusType === 'all') size *= skin.value;
                return size;
            },

            getMaxHealth() {
                let hp = 100 + (gameState.upgrades.health.level - 1) * 20;
                const skin = SKINS[gameState.activeSkin];
                if (skin.bonusType === 'health') hp *= skin.value;
                if (skin.bonusType === 'all') hp *= skin.value;
                return hp;
            },

            update() {
                const maxSpeed = 6;
                if (keys.a) this.velocityX = -maxSpeed;
                else if (keys.d) this.velocityX = maxSpeed;
                else this.velocityX *= 0.85;

                if (keys.w) this.velocityY = -maxSpeed;
                else if (keys.s) this.velocityY = maxSpeed;
                else this.velocityY *= 0.85;

                this.x += this.velocityX;
                this.y += this.velocityY;

                if (this.x < 40) this.x = 40;
                if (this.x + 40 > canvas.width) this.x = canvas.width - 40;
                if (this.y < 40) this.y = 40;
                if (this.y + 40 > canvas.height) this.y = canvas.height - 40;

                if (this.fireRate > 0) this.fireRate--;
            },

            takeDamage(amount) {
                this.health -= amount;
                if (this.health < 0) this.health = 0;
                playSound('hit');
            },

            shoot(targetX, targetY) {
                if (this.fireRate <= 0) {
                    const angle = Math.atan2(targetY - (this.y + this.height / 2), 
                                           targetX - (this.x + this.width / 2));
                    this.rotation = angle;
                    
                    bullets.push({
                        x: this.x + Math.cos(angle) * 45,
                        y: this.y + Math.sin(angle) * 45,
                        vx: Math.cos(angle) * 9,
                        vy: Math.sin(angle) * 9,
                        life: 120,
                        damage: this.getDamage(),
                        size: this.getBulletSize()
                    });

                    this.fireRate = this.getFireRate();
                    playSound('shoot');
                }
            },

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                if (images.cat.complete && images.cat.naturalHeight !== 0) {
                    ctx.drawImage(images.cat, -40, -40, 80, 80);
                } else {
                    ctx.fillStyle = '#ff8c42';
                    ctx.beginPath();
                    ctx.arc(0, 0, 30, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.fillRect(-10, -5, 5, 5);
                    ctx.fillRect(10, -5, 5, 5);
                }

                ctx.restore();
            }
        };

        // ============ ВРАГИ (МЫШИ) ============
        let enemies = [];
        let bossActive = false;

        function createEnemy(type) {
            const baseX = Math.random() * (canvas.width - 60) + 30;
            const baseY = Math.random() * (canvas.height / 2 - 60) + 30;

            if (type === 'normal') {
                // Выбираем случайный тип мыши (1-4 для обычных)
                const mouseType = Math.floor(Math.random() * 4) + 1;
                const mouseImg = images['mouse' + mouseType];

                return {
                    type: 'normal',
                    mouseType: mouseType,
                    x: baseX,
                    y: baseY,
                    width: 40,
                    height: 40,
                    velocityX: (Math.random() - 0.5) * 2.5,
                    velocityY: (Math.random() - 0.5) * 2.5,
                    health: 15 + gameState.currentWave * 2,
                    maxHealth: 15 + gameState.currentWave * 2,
                    alive: true,

                    update() {
                        this.x += this.velocityX;
                        this.y += this.velocityY;

                        if (this.x < 0 || this.x > canvas.width) this.velocityX *= -1;
                        if (this.y < 0 || this.y > canvas.height / 1.5) this.velocityY *= -1;
                    },

                    takeDamage(amount) {
                        this.health -= amount;
                        if (this.health <= 0) {
                            this.alive = false;
                            gameState.score += 50;
                            gameState.milk += 10 + gameState.currentWave * 2;
                            gameState.kills++;
                            playSound('enemy-death');
                        }
                    },

                    draw() {
                        if (mouseImg.complete && mouseImg.naturalHeight !== 0) {
                            ctx.drawImage(mouseImg, this.x - 20, this.y - 20, this.width, this.height);
                        }

                        // HP bar
                        ctx.fillStyle = '#333';
                        ctx.fillRect(this.x - 20, this.y - 30, 40, 5);
                        ctx.fillStyle = '#00ff00';
                        ctx.fillRect(this.x - 20, this.y - 30, 40 * (this.health / this.maxHealth), 5);
                    }
                };
            } else if (type === 'boss') {
                return {
                    type: 'boss',
                    x: canvas.width / 2,
                    y: 150,
                    width: 140,
                    height: 140,
                    velocityX: 3,
                    velocityY: 2,
                    changeDirectionTimer: 0,
                    health: 200 + gameState.currentWave * 50,
                    maxHealth: 200 + gameState.currentWave * 50,
                    shootTimer: 0,
                    alive: true,

                    update() {
                        // Хаотичное движение
                        this.changeDirectionTimer++;
                        if (this.changeDirectionTimer > 60) {
                            this.velocityX = (Math.random() - 0.5) * 6;
                            this.velocityY = (Math.random() - 0.5) * 6;
                            this.changeDirectionTimer = 0;
                        }

                        this.x += this.velocityX;
                        this.y += this.velocityY;

                        // Отскок от краёв
                        if (this.x < 70 || this.x > canvas.width - 70) {
                            this.velocityX *= -1;
                            this.x = Math.max(70, Math.min(canvas.width - 70, this.x));
                        }
                        if (this.y < 70 || this.y > canvas.height - 100) {
                            this.velocityY *= -1;
                            this.y = Math.max(70, Math.min(canvas.height - 100, this.y));
                        }

                        // Усиленные атаки - каждые 40 фреймов
                        this.shootTimer++;
                        if (this.shootTimer > 40) {
                            this.shoot();
                            this.shootTimer = 0;
                        }
                    },

                    shoot() {
                        // Босс стреляет в разные стороны
                        const angle = Math.atan2(player.y - this.y, player.x - this.x);
                        
                        for (let i = -1; i <= 1; i++) {
                            enemyBullets.push({
                                x: this.x,
                                y: this.y,
                                vx: Math.cos(angle + i * 0.3) * 5,
                                vy: Math.sin(angle + i * 0.3) * 5,
                                life: 100,
                                damage: 10
                            });
                        }
                    },

                    takeDamage(amount) {
                        this.health -= amount;
                        if (this.health <= 0) {
                            this.alive = false;
                            gameState.score += 1000;
                            gameState.milk += 200 + gameState.currentWave * 100;
                            gameState.kills++;
                            playSound('enemy-death');
                            bossActive = false;
                        }
                    },

                    draw() {
                        if (images.mouse5.complete && images.mouse5.naturalHeight !== 0) {
                            ctx.drawImage(images.mouse5, this.x - 70, this.y - 70, this.width, this.height);
                        }

                        // HP bar - большая
                        ctx.fillStyle = '#333';
                        ctx.fillRect(this.x - 70, this.y - 90, 140, 8);
                        ctx.fillStyle = '#ff0000';
                        ctx.fillRect(this.x - 70, this.y - 90, 140 * (this.health / this.maxHealth), 8);

                        ctx.fillStyle = '#ff0000';
                        ctx.font = 'bold 18px Arial';
                        ctx.textAlign = 'center';
                        ctx.fillText('👹 БОСС', this.x, this.y + 100);
                    }
                };
            }
        }

        // ============ СНАРЯДЫ ============
        let bullets = [];
        let enemyBullets = [];

        function createWave(waveNum) {
            enemies = [];
            bullets = [];
            enemyBullets = [];
            bossActive = false;

            player.health = player.getMaxHealth();
            player.velocityX = 0;
            player.velocityY = 0;

            // Боссы каждые 3 волны
            if (waveNum % 3 === 0) {
                enemies.push(createEnemy('boss'));
                bossActive = true;
                showLevelInfo(`👹 ВОЛНА БОССА ${waveNum}`, 'Королева Крыс с УСИЛЕННЫМИ АТАКАМИ!');
            } else {
                // Обычные волны с растущим количеством врагов
                const enemyCount = 4 + Math.floor(waveNum / 2);
                
                for (let i = 0; i < enemyCount; i++) {
                    enemies.push(createEnemy('normal'));
                }

                showLevelInfo(`ВОЛНА ${waveNum}`, `Обычные мыши: ${enemyCount}`);
            }
        }

        function showLevelInfo(title, desc) {
            document.getElementById('levelTitle').textContent = title;
            document.getElementById('levelDesc').textContent = desc;
            document.getElementById('levelInfo').style.display = 'block';
            setTimeout(() => {
                document.getElementById('levelInfo').style.display = 'none';
            }, 3000);
        }

        // ============ УЛУЧШЕНИЯ ============
        function upgradeDamage() {
            const cost = gameState.upgrades.damage.cost * gameState.upgrades.damage.level;
            if (gameState.milk >= cost) {
                gameState.milk -= cost;
                gameState.upgrades.damage.level++;
                updateUI();
            }
        }

        function upgradeFireRate() {
            const cost = gameState.upgrades.fireRate.cost * gameState.upgrades.fireRate.level;
            if (gameState.milk >= cost) {
                gameState.milk -= cost;
                gameState.upgrades.fireRate.level++;
                updateUI();
            }
        }

        function upgradeBulletSize() {
            const cost = gameState.upgrades.bulletSize.cost * gameState.upgrades.bulletSize.level;
            if (gameState.milk >= cost) {
                gameState.milk -= cost;
                gameState.upgrades.bulletSize.level++;
                updateUI();
            }
        }

        function upgradeHealth() {
            const cost = gameState.upgrades.health.cost * gameState.upgrades.health.level;
            if (gameState.milk >= cost) {
                gameState.milk -= cost;
                gameState.upgrades.health.level++;
                player.maxHealth = player.getMaxHealth();
                player.health = player.maxHealth;
                updateUI();
            }
        }

        // ============ СКИНЫ ============
        function showSkinsPanel() {
            const grid = document.getElementById('skinsGrid');
            grid.innerHTML = '';

            for (const [key, skin] of Object.entries(SKINS)) {
                const owned = gameState.ownedSkins.includes(key);
                const active = gameState.activeSkin === key;

                const item = document.createElement('div');
                item.className = 'skin-item';
                if (owned) item.classList.add('owned');
                if (active) item.classList.add('active');

                item.innerHTML = `
                    <div class="skin-emoji">${skin.emoji}</div>
                    <div class="skin-name">${skin.name}</div>
                    <div class="skin-bonus">${skin.bonus}</div>
                    <div class="skin-cost">${owned ? (active ? '✓ Активен' : '✓ Куплен') : skin.cost + ' 🥛'}</div>
                `;

                item.onclick = () => {
                    if (!owned && gameState.milk >= skin.cost) {
                        gameState.milk -= skin.cost;
                        gameState.ownedSkins.push(key);
                        gameState.activeSkin = key;
                        player.maxHealth = player.getMaxHealth();
                        player.health = player.maxHealth;
                        showSkinsPanel();
                        updateUI();
                    } else if (owned) {
                        gameState.activeSkin = key;
                        player.maxHealth = player.getMaxHealth();
                        player.health = player.maxHealth;
                        showSkinsPanel();
                        updateUI();
                    }
                };

                grid.appendChild(item);
            }

            document.getElementById('skinsPanel').style.display = 'block';
        }

        function hideSkinsPanel() {
            document.getElementById('skinsPanel').style.display = 'none';
        }

        function updateUI() {
            document.getElementById('milk').textContent = gameState.milk;
            document.getElementById('damage').textContent = Math.round(player.getDamage());
            
            const damageCost = gameState.upgrades.damage.cost * gameState.upgrades.damage.level;
            const fireRateCost = gameState.upgrades.fireRate.cost * gameState.upgrades.fireRate.level;
            const bulletCost = gameState.upgrades.bulletSize.cost * gameState.upgrades.bulletSize.level;
            const healthCost = gameState.upgrades.health.cost * gameState.upgrades.health.level;

            document.getElementById('damageCost').textContent = damageCost + '🥛';
            document.getElementById('fireRateCost').textContent = fireRateCost + '🥛';
            document.getElementById('bulletCost').textContent = bulletCost + '🥛';
            document.getElementById('healthCost').textContent = healthCost + '🥛';

            document.getElementById('damageBtn').disabled = gameState.milk < damageCost;
            document.getElementById('fireRateBtn').disabled = gameState.milk < fireRateCost;
            document.getElementById('bulletBtn').disabled = gameState.milk < bulletCost;
            document.getElementById('healthBtn').disabled = gameState.milk < healthCost;
        }

        // ============ СТРЕЛЬБА ============
        canvas.addEventListener('touchstart', (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            player.shoot(x, y);
        });

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            player.shoot(x, y);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ============ ГЛАВНЫЙ ЦИКЛ ============
        function gameLoop() {
            ctx.fillStyle = '#87ceeb';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Облака
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            for (let i = 0; i < 5; i++) {
                const x = (Date.now() / 80 + i * 250) % (canvas.width + 100);
                ctx.beginPath();
                ctx.arc(x, 50 + i * 50, 35, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x + 25, 50 + i * 50, 40, 0, Math.PI * 2);
                ctx.fill();
            }

            if (!gameState.isGameOver) {
                player.update();
                
                for (let enemy of enemies) {
                    if (enemy.alive) enemy.update();
                }

                for (let i = bullets.length - 1; i >= 0; i--) {
                    const bullet = bullets[i];
                    bullet.x += bullet.vx;
                    bullet.y += bullet.vy;
                    bullet.life--;

                    if (bullet.life <= 0 || bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                        bullets.splice(i, 1);
                        continue;
                    }

                    for (let enemy of enemies) {
                        if (enemy.alive && 
                            bullet.x > enemy.x - 25 && bullet.x < enemy.x + 25 &&
                            bullet.y > enemy.y - 25 && bullet.y < enemy.y + 25) {
                            
                            enemy.takeDamage(bullet.damage);
                            playSound('hit');
                            bullets.splice(i, 1);
                            break;
                        }
                    }
                }

                for (let enemy of enemies) {
                    if (enemy.alive && Math.random() < 0.008) {
                        if (Math.hypot(enemy.x - player.x, enemy.y - player.y) < 400) {
                            const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                            enemyBullets.push({
                                x: enemy.x,
                                y: enemy.y,
                                vx: Math.cos(angle) * 4,
                                vy: Math.sin(angle) * 4,
                                life: 100,
                                damage: 5
                            });
                        }
                    }
                }

                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const bullet = enemyBullets[i];
                    bullet.x += bullet.vx;
                    bullet.y += bullet.vy;
                    bullet.life--;

                    if (bullet.life <= 0 || bullet.x < 0 || bullet.x > canvas.width || bullet.y < 0 || bullet.y > canvas.height) {
                        enemyBullets.splice(i, 1);
                        continue;
                    }

                    if (bullet.x > player.x - 40 && bullet.x < player.x + 40 &&
                        bullet.y > player.y - 40 && bullet.y < player.y + 40) {
                        
                        player.takeDamage(bullet.damage || 5);
                        enemyBullets.splice(i, 1);
                    }
                }

                const allEnemiesDead = enemies.every(e => !e.alive);
                if (allEnemiesDead && enemies.length > 0) {
                    gameState.currentWave++;
                    createWave(gameState.currentWave);
                }

                if (player.health <= 0) {
                    gameState.isGameOver = true;
                    document.getElementById('gameOverScore').textContent = `Очки: ${gameState.score}`;
                    document.getElementById('gameOverKills').textContent = `Убито мышей: ${gameState.kills}`;
                    document.getElementById('gameOverLevel').textContent = `Волн пройдено: ${gameState.currentWave}`;
                    document.getElementById('gameOver').style.display = 'block';
                }

                player.draw();

                for (let enemy of enemies) {
                    if (enemy.alive) enemy.draw();
                }

                for (let bullet of bullets) {
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 255, 0, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, bullet.size + 2, 0, Math.PI * 2);
                    ctx.stroke();
                }

                for (let bullet of enemyBullets) {
                    ctx.fillStyle = '#ff6b9d';
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 107, 157, 0.6)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(bullet.x, bullet.y, 5, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }

            document.getElementById('healthFill').style.width = (player.health / player.maxHealth * 100) + '%';
            document.getElementById('level').textContent = gameState.currentWave;
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('kills').textContent = gameState.kills;

            updateUI();

            requestAnimationFrame(gameLoop);
        }

        createWave(1);
        updateUI();
        gameLoop();
    </script>
</body>
</html>
