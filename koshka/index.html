<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pushicat Ultimate</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont;
background:linear-gradient(180deg,#87CEFA,#dff6ff);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:360px;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(25px);
border-radius:30px;
padding:20px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
text-align:center;
}

.milk{
font-size:34px;
font-weight:700;
}

.lives{
font-size:14px;
opacity:0.7;
margin-bottom:10px;
}

.cat{
width:300px;
cursor:pointer;
animation:idle 3s infinite ease-in-out;
transition:0.15s;
}

@keyframes idle{
0%,100%{transform:scale(1)}
50%{transform:scale(1.05)}
}

.cat:active{transform:scale(0.93)}

.shopBtn{
margin-top:10px;
padding:12px;
border-radius:15px;
background:#4fc3f7;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}
.shopBtn:hover{transform:scale(1.05)}

.shop{
display:none;
margin-top:10px;
background:white;
border-radius:20px;
padding:10px;
}

.item{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:#f7f7f7;
border-radius:12px;
cursor:pointer;
transition:0.2s;
}
.item:hover{
background:#e3f7ff;
transform:scale(1.02);
}

.float{
position:absolute;
font-weight:bold;
animation:float 1s forwards;
}

@keyframes float{
0%{opacity:1}
100%{opacity:0;transform:translateY(-60px)}
}

.heart{
position:absolute;
font-size:20px;
animation:heart 1s forwards;
}
@keyframes heart{
0%{opacity:1}
100%{opacity:0;transform:translateY(-50px)}
}

.note{
position:fixed;
bottom:20px;
background:black;
color:white;
padding:10px 20px;
border-radius:20px;
opacity:0;
transition:0.3s;
}
.show{opacity:1}

.star{
position:fixed;
font-size:20px;
animation:fall 2s linear;
}
@keyframes fall{
0%{top:-10px}
100%{top:100vh}
}

.glow{
animation:glow 0.4s;
}
@keyframes glow{
50%{box-shadow:0 0 40px gold}
}
</style>
</head>

<body>

<div class="container">

<div class="milk">🥛 <span id="milk">0</span></div>
<div class="lives">Жизни: <span id="lives">0</span></div>

<img src="cat.JPG" id="cat" class="cat">

<div class="shopBtn" onclick="toggleShop()">Магазин</div>

<div class="shop" id="shop">

<div class="item" onclick="buy('tap')">
<span>🥛 Корм</span>
<span id="tapInfo"></span>
</div>

<div class="item" onclick="buy('toy')">
<span>🧸 Игрушка</span>
<span id="toyInfo"></span>
</div>

<div class="item" onclick="buy('bed')">
<span>🛏 Лежанка</span>
<span id="bedInfo"></span>
</div>

<div class="item" onclick="buy('bowl')">
<span>🥣 Миска</span>
<span id="bowlInfo"></span>
</div>

</div>

</div>

<div class="note" id="note"></div>
<audio id="meow" src="kitten.mp3"></audio>

<script>
let milk=0,perTap=1,passive=0,lives=0;
let combo=0,lastTap=Date.now();
let boost=false;

let cost={tap:10,toy:15,bed:50,bowl:100};

const cat=document.getElementById('cat');

function update(){
milkEl.textContent=milk;
livesEl.textContent=lives;

tapInfo.textContent=`+${perTap} | ${cost.tap}`;
toyInfo.textContent=`+${passive} | ${cost.toy}`;
bedInfo.textContent=`${cost.bed}`;
bowlInfo.textContent=`${cost.bowl}`;
}

function notify(t){
note.textContent=t;
note.classList.add('show');
setTimeout(()=>note.classList.remove('show'),2000);
}

cat.onclick=(e)=>{
let now=Date.now();
combo=(now-lastTap<2000)?combo+1:1;
lastTap=now;

let crit=Math.random()<0.1;
let gain=Math.floor(perTap*(1+combo*0.1));
if(crit) gain*=2;
if(boost) gain*=2;

milk+=gain;

meow.currentTime=0;
meow.play();

spawnFloat(e.clientX,e.clientY,'+'+gain);
spawnHeart(e.clientX,e.clientY);

cat.classList.add('glow');
setTimeout(()=>cat.classList.remove('glow'),300);

progress();
update();
}

function spawnFloat(x,y,text){
let f=document.createElement('div');
f.className='float';
f.textContent=text;
f.style.left=x+'px';
f.style.top=y+'px';
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
}

function spawnHeart(x,y){
let h=document.createElement('div');
h.className='heart';
h.textContent='💖';
h.style.left=x+'px';
h.style.top=y+'px';
document.body.appendChild(h);
setTimeout(()=>h.remove(),1000);
}

function buy(t){
if(milk<cost[t]) return notify("Мало молока");

milk-=cost[t];

if(t==='tap'){perTap++;cost.tap*=1.4}
if(t==='toy'){passive++;cost.toy*=1.5}
if(t==='bed'){passive+=3;cost.bed*=1.6}
if(t==='bowl'){passive+=5;cost.bowl*=1.7}

update();
}

setInterval(()=>{milk+=passive;update();},1000);

setInterval(()=>{
if(Math.random()<0.1&&!boost){
boost=true;
notify("✨ x2 буст!");
setTimeout(()=>boost=false,5000);
}
},8000);

function starRain(n){
for(let i=0;i<n;i++){
let s=document.createElement('div');
s.className='star';
s.textContent='⭐';
s.style.left=Math.random()*100+'vw';
document.body.appendChild(s);
setTimeout(()=>s.remove(),2000);
}
}

function progress(){
let newLives=Math.floor(milk/1000);
if(newLives>lives){
lives=newLives;
if(milk>=15000){
starRain(40);
notify("🐱 Максимальный уровень!");
}else{
starRain(5);
}
}
}

function toggleShop(){
shop.style.display=shop.style.display==='block'?'none':'block';
}

// refs
const milkEl=document.getElementById('milk');
const livesEl=document.getElementById('lives');
const tapInfo=document.getElementById('tapInfo');
const toyInfo=document.getElementById('toyInfo');
const bedInfo=document.getElementById('bedInfo');
const bowlInfo=document.getElementById('bowlInfo');
const note=document.getElementById('note');
const meow=document.getElementById('meow');

update();
</script>

</body>
</html>
